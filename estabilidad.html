<html lang="es">
<head>
<meta charset="UTF-8">
<title>Programa de Estabilidad — LCC</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
:root{--bg:#F4F6F5;--panel:#FFF;--ink:#1E2B2E;--ink2:#5B6B6E;--line:#DCE3E1;--teal:#0E6B67;--td:#0A4F4C;--tt:#E4F1EF;--amber:#B9762A;--at:#FBEEDF;--red:#B03A2E;--rt:#F8E7E4;--green:#357A55;--gt:#E6F1EA;--grey:#8592A0;--grt:#EEF1F3;--r:10px;--sh:0 1px 2px rgba(20,30,30,.06),0 1px 12px rgba(20,30,30,.05);}
*{box-sizing:border-box;}body{margin:0;background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',-apple-system,sans-serif;font-size:14px;line-height:1.5;}
.mono{font-family:'IBM Plex Mono',monospace;}
header.app{background:var(--td);color:#fff;padding:18px 28px 0 28px;}
.app-title{font-size:19px;font-weight:700;}.app-sub{font-size:12px;color:#BFE0DB;font-family:'IBM Plex Mono',monospace;}
nav.tabs{display:flex;gap:2px;margin-top:16px;flex-wrap:wrap;}
nav.tabs button{background:transparent;border:none;color:#CFE7E3;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;border-radius:8px 8px 0 0;font-family:inherit;}
nav.tabs button.active{background:var(--bg);color:var(--td);}nav.tabs button:hover:not(.active){background:rgba(255,255,255,.08);}
main{padding:24px 28px 60px 28px;max-width:1320px;margin:0 auto;}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);}.panel+.panel{margin-top:18px;}.pp{padding:20px 22px;}
h2.st{font-size:15px;font-weight:700;margin:0 0 4px 0;color:var(--td);}.sd{font-size:12.5px;color:var(--ink2);margin:0 0 16px 0;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:18px;}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);cursor:pointer;transition:transform .12s,box-shadow .12s;}
.kpi:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(20,30,30,.1);}
.kpi .n{font-size:28px;font-weight:700;font-family:'IBM Plex Mono',monospace;}.kpi .lb{font-size:12px;color:var(--ink2);margin-top:2px;}
.kpi.amber .n{color:var(--amber);}.kpi.red .n{color:var(--red);}.kpi.teal .n{color:var(--teal);}.kpi.green .n{color:var(--green);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink2);padding:8px 10px;border-bottom:1px solid var(--line);}
td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}tr:last-child td{border-bottom:none;}
tr.ck{cursor:pointer;}tr.ck:hover{background:var(--grt);}
.tag{display:inline-block;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:11px;padding:2px 7px;border-radius:3px;letter-spacing:.03em;border:1px solid currentColor;}
.tag.pendiente{color:var(--grey);background:var(--grt);}.tag.proximo{color:var(--amber);background:var(--at);}.tag.atrasado{color:var(--red);background:var(--rt);}.tag.realizado{color:var(--green);background:var(--gt);}
.bs{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 10px 4px 8px;border-radius:20px;background:var(--tt);color:var(--td);}.bs .dot{width:6px;height:6px;border-radius:50%;background:var(--teal);}
.sp{display:inline-flex;align-items:center;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:11.5px;padding:3px 8px;background:#FFFCF2;border:1px solid #D8CDA6;border-radius:2px;color:#6B5A22;box-shadow:0 1px 1px rgba(0,0,0,.05);}
button.btn{font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;padding:8px 16px;border-radius:7px;border:1px solid var(--teal);background:var(--teal);color:#fff;}
button.btn:hover{background:var(--td);}
button.btn.ghost{background:transparent;color:var(--td);border:1px solid var(--line);}button.btn.ghost:hover{background:var(--tt);border-color:var(--teal);}
button.btn.sm{padding:4px 10px;font-size:12px;}
button.btn.danger{background:#fff;color:var(--red);border-color:var(--red);}button.btn.danger:hover{background:var(--rt);}
button.btn.approve{background:var(--green);border-color:var(--green);color:#fff;}
button.btn.mail{background:#4285F4;border-color:#3367D6;color:#fff;}button.btn.mail:hover{background:#3367D6;}
input[type=text],input[type=email],input[type=date],input[type=number],select,textarea{font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);width:100%;}
textarea{resize:vertical;min-height:56px;}
label.fi{display:block;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:5px;}.fw{margin-bottom:14px;}
.fg{display:grid;grid-template-columns:repeat(2,1fr);gap:14px 18px;}.fg.c3{grid-template-columns:repeat(3,1fr);}
@media(max-width:700px){.fg,.fg.c3{grid-template-columns:1fr;}}
fieldset{border:1px solid var(--line);border-radius:8px;padding:14px 16px 6px 16px;margin:0 0 16px 0;}
legend{font-size:12px;font-weight:700;color:var(--td);padding:0 6px;}
.empty{text-align:center;padding:40px 20px;color:var(--ink2);}.empty .big{font-size:32px;margin-bottom:8px;}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
.toolbar select,.toolbar input{width:auto;min-width:150px;}.spacer{flex:1;}
.stage-track{display:flex;gap:4px;flex-wrap:wrap;margin:14px 0 4px 0;}
.stage-step{flex:1;min-width:90px;text-align:center;padding:8px 4px;border-radius:7px;font-size:10.5px;font-weight:600;background:var(--grt);color:var(--ink2);border:1px solid var(--line);}
.stage-step.done{background:var(--tt);color:var(--td);border-color:var(--teal);}.stage-step.current{background:var(--teal);color:#fff;border-color:var(--td);}
.stage-step .at{display:block;font-size:9px;font-weight:400;opacity:.7;margin-top:1px;}
.cc{border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin-bottom:10px;background:#FCFDFD;}
.ch{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.cf{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:12px;}.cf .fw{margin:0;}.cf label.fi{margin-bottom:3px;}
.tb{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
.tc{font-size:11.5px;padding:4px 10px;border-radius:16px;border:1px solid var(--teal);color:var(--td);background:var(--tt);cursor:pointer;font-family:inherit;font-weight:600;}.tc:hover{background:var(--teal);color:#fff;}
.an{font-size:12px;color:var(--ink2);background:var(--tt);border:1px solid var(--teal);border-radius:7px;padding:8px 12px;margin-top:10px;display:flex;align-items:center;gap:8px;}.an .icon{font-size:16px;}
.rb{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 6px;border-radius:3px;margin-left:6px;}
.rb.creador{background:#E8E0F4;color:#5B3A8A;}.rb.analista{background:#DAEEF8;color:#1A6B94;}.rb.dt{background:#FFF3D8;color:#8B6914;}
.print-only{display:none;}@media print{header.app,.no-print{display:none !important;}body{background:#fff;}main{padding:0;max-width:none;}.print-only{display:block;}.panel{box-shadow:none;border:none;}}
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;box-shadow:var(--sh);opacity:0;transform:translateY(6px);transition:all .25s;pointer-events:none;z-index:50;}.toast.show{opacity:1;transform:translateY(0);}
.rd{max-width:820px;margin:0 auto;}.rd h1{font-size:18px;color:var(--td);border-bottom:2px solid var(--teal);padding-bottom:8px;}
.rd h3{font-size:13px;color:var(--td);margin:20px 0 6px 0;text-transform:uppercase;letter-spacing:.03em;}
.rd .kv{display:grid;grid-template-columns:220px 1fr;gap:4px 12px;font-size:13px;margin-bottom:4px;}.rd .kv .k{color:var(--ink2);}
a.lb{font-size:12.5px;color:var(--td);cursor:pointer;text-decoration:underline;}
.spv{max-height:300px;overflow:auto;margin-top:10px;border:1px solid var(--line);border-radius:8px;}.spv table td,.spv table th{font-size:12px;padding:6px 8px;}
.param-row{display:grid;grid-template-columns:1fr 1fr 1fr 90px 110px 36px;gap:8px;align-items:end;margin-bottom:8px;}
.param-row.hdr{font-size:11px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px;}
.param-row input,.param-row select{font-size:12px;padding:6px 8px;}
.param-row .del{width:32px;height:32px;border:none;background:transparent;color:var(--red);cursor:pointer;font-size:16px;border-radius:4px;}.param-row .del:hover{background:var(--rt);}
@media(max-width:800px){.param-row{grid-template-columns:1fr 1fr;}}
.sync-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:#BFE0DB;}
.sync-dot{width:8px;height:8px;border-radius:50%;}.sync-dot.ok{background:#5CDB95;}.sync-dot.err{background:#FF6B6B;}.sync-dot.loading{background:#FFD93D;animation:pulse .8s infinite;}
.cond-card{border:2px solid var(--line);border-radius:8px;padding:10px 14px;margin:8px 0;background:#FCFDFD;}
.cond-card .cond-title{font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:6px;margin-bottom:8px;}
.cond-card .cond-dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
.tipo-badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;margin-left:8px;}
.tipo-badge.nat{background:#E4F1EF;color:#0A4F4C;border:1px solid #0E6B67;}
.tipo-badge.acel{background:#FBEEDF;color:#7A5118;border:1px solid #B9762A;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.setup-box{max-width:720px;margin:40px auto;}.setup-box h1{color:var(--td);font-size:22px;margin-bottom:8px;}
.setup-box .step{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px 20px;margin-bottom:12px;}
.setup-box .step-num{display:inline-flex;width:28px;height:28px;align-items:center;justify-content:center;background:var(--teal);color:#fff;border-radius:50%;font-size:13px;font-weight:700;margin-right:10px;}
.setup-box .step h3{display:inline;font-size:14px;color:var(--ink);}
.setup-box pre{background:#1E2B2E;color:#E4F1EF;padding:14px;border-radius:8px;font-size:11.5px;overflow-x:auto;line-height:1.5;margin:10px 0;white-space:pre-wrap;word-break:break-all;}
.setup-box .copy-btn{font-size:11px;padding:3px 8px;border-radius:4px;border:1px solid #5B6B6E;background:transparent;color:#BFE0DB;cursor:pointer;float:right;margin:-4px 0 4px 8px;}.setup-box .copy-btn:hover{background:#2A3D40;}
.mail-card{background:#EEF3FE;border:1px solid #B8D0F9;border-radius:8px;padding:12px 16px;margin:10px 0;}
.mail-card .subj{font-weight:700;color:#1A56DB;font-size:13px;}.mail-card .to{font-size:12px;color:var(--ink2);margin-bottom:4px;}
</style>
</head>
<body>
<header class="app no-print">
  <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px">
    <div><div class="app-title">Programa de Estabilidad · LCC</div><div class="app-sub">SOP-LCC-049 V4.0 · Vessena S.A.</div></div>
    <div class="sync-bar" id="syncBar"></div>
  </div>
  <nav class="tabs" id="tabNav"></nav>
</header>
<main id="mc"></main>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   GOOGLE SHEETS BACKEND + EMAIL
============================================================ */
let SCRIPT_URL=localStorage.getItem('gscript_url')||'';
let syncStatus='disconnected';

async function gRead(){if(!SCRIPT_URL)return null;syncStatus='loading';rSync();try{const r=await fetch(SCRIPT_URL+'?t='+Date.now());const d=await r.json();syncStatus='ok';rSync();return d;}catch(e){syncStatus='error';rSync();return null;}}
async function gWrite(key,value){if(!SCRIPT_URL)return;syncStatus='loading';rSync();try{const ctrl=new AbortController();const tid=setTimeout(()=>ctrl.abort(),10000);await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'save',key,value:JSON.stringify(value)}),signal:ctrl.signal});clearTimeout(tid);syncStatus='ok';rSync();}catch(e){syncStatus='ok';rSync();}}
/* EMAILS FIJOS — reciben copia de TODAS las notificaciones */
const CC_EMAILS=['claudia.barlocco@vessena.com.uy','antonella.nunez@vessena.com.uy'];

async function gSendEmail(to,subject,body){if(!SCRIPT_URL)return;
  // Combinar destinatario + supervisión, sin duplicados
  const all=new Set();
  if(to)to.split(',').forEach(e=>all.add(e.trim()));
  CC_EMAILS.forEach(e=>all.add(e));
  const dest=[...all].filter(Boolean).join(',');
  try{await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'email',to:dest,subject,body})});toast('Email enviado');}catch(e){toast('Error enviando email');}}

function rSync(){const b=document.getElementById('syncBar');if(!b)return;const m={ok:['ok','Google Sheets ✓'],error:['err','Error conexión'],loading:['loading','Guardando…'],disconnected:['err','No conectado']};const[c,t]=m[syncStatus]||m.disconnected;b.innerHTML=`<span class="sync-dot ${c}"></span> ${t}`;}

/* ============================================================
   APPS SCRIPT CODE (with email support)
============================================================ */
const APPS_SCRIPT_CODE=`// === PROGRAMA DE ESTABILIDAD — BACKEND ===
// Pegar este código en Apps Script y desplegar como aplicación web.

function doGet(e) {
  var sheet = getSheet();
  var data = {};
  var rows = sheet.getDataRange().getValues();
  for (var i = 1; i < rows.length; i++) {
    if (rows[i][0]) data[rows[i][0]] = rows[i][1];
  }
  return ContentService.createTextOutput(JSON.stringify(data))
    .setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  var payload = JSON.parse(e.postData.contents);

  if (payload.action === 'email') {
    sendEmail_(payload.to, payload.subject, payload.body);
    return ContentService.createTextOutput(JSON.stringify({ok:true}))
      .setMimeType(ContentService.MimeType.JSON);
  }

  // Default: save data
  var sheet = getSheet();
  var key = payload.key;
  var value = payload.value;
  var rows = sheet.getDataRange().getValues();
  var found = false;
  for (var i = 1; i < rows.length; i++) {
    if (rows[i][0] === key) {
      sheet.getRange(i+1, 2).setValue(value);
      found = true; break;
    }
  }
  if (!found) sheet.appendRow([key, value]);
  return ContentService.createTextOutput(JSON.stringify({ok:true}))
    .setMimeType(ContentService.MimeType.JSON);
}

function getSheet() {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sheet = ss.getSheetByName('Data');
  if (!sheet) { sheet = ss.insertSheet('Data'); sheet.appendRow(['key','value']); }
  return sheet;
}

function sendEmail_(to, subject, body) {
  if (!to) return;
  var supervision = ['claudia.barlocco@vessena.com.uy','antonella.nunez@vessena.com.uy'];
  var allEmails = {};
  to.split(',').forEach(function(e){ e=e.trim(); if(e) allEmails[e]=true; });
  supervision.forEach(function(e){ allEmails[e]=true; });
  Object.keys(allEmails).forEach(function(email) {
    MailApp.sendEmail({
      to: email,
      subject: '[LCC Estabilidad] ' + subject,
      htmlBody: body
    });
  });
}

// ============================================
// RECORDATORIOS DIARIOS (ejecutar una vez crearTrigger)
// ============================================
function crearTrigger() {
  // Eliminar triggers anteriores
  var triggers = ScriptApp.getProjectTriggers();
  triggers.forEach(function(t) { ScriptApp.deleteTrigger(t); });
  // Crear trigger diario a las 8:00
  ScriptApp.newTrigger('enviarRecordatorios')
    .timeBased()
    .everyDays(1)
    .atHour(8)
    .create();
  Logger.log('Trigger creado: recordatorios diarios a las 8:00');
}

function enviarRecordatorios() {
  var sheet = getSheet();
  var rows = sheet.getDataRange().getValues();
  var studiesJson = '';
  for (var i = 1; i < rows.length; i++) {
    if (rows[i][0] === 'studies') { studiesJson = rows[i][1]; break; }
  }
  if (!studiesJson) return;

  var studies = JSON.parse(studiesJson);
  var hoy = new Date();
  var manana = new Date(hoy);
  manana.setDate(manana.getDate() + 1);
  var mananaStr = Utilities.formatDate(manana, Session.getScriptTimeZone(), 'yyyy-MM-dd');
  var hoyStr = Utilities.formatDate(hoy, Session.getScriptTimeZone(), 'yyyy-MM-dd');

  studies.forEach(function(s) {
    if (!s.emailAnalista || s.stage >= 5) return;

    // Checkpoints para mañana
    var proximos = [];
    var atrasados = [];
    s.checkpoints.forEach(function(cp) {
      if (cp.fechaReal) return; // ya realizado
      if (cp.fechaProgramada === mananaStr) proximos.push(cp);
      if (cp.fechaProgramada < hoyStr) atrasados.push(cp);
    });

    if (proximos.length > 0) {
      var cpList = proximos.map(function(cp) {
        return '<li><strong>' + cp.codigo + '</strong> (Mes ' + cp.mes + ') — ' + cp.fechaProgramada + '</li>';
      }).join('');
      var body = '<div style="font-family:Arial,sans-serif;max-width:600px">'
        + '<h2 style="color:#0A4F4C">Recordatorio: Muestreo mañana</h2>'
        + '<p>Producto: <strong>' + s.producto + '</strong> — Lote: <strong>' + s.lote + '</strong></p>'
        + '<p>Los siguientes puntos de muestreo están programados para mañana:</p>'
        + '<ul>' + cpList + '</ul>'
        + '<p style="color:#5B6B6E;font-size:12px">Programa de Estabilidad — LCC / Vessena S.A.</p>'
        + '</div>';
      sendEmail_(s.emailAnalista, 'Muestreo mañana: ' + s.producto + ' (Lote ' + s.lote + ')', body);
    }

    if (atrasados.length > 0) {
      var cpList2 = atrasados.map(function(cp) {
        return '<li><strong>' + cp.codigo + '</strong> (Mes ' + cp.mes + ') — programado: ' + cp.fechaProgramada + '</li>';
      }).join('');
      var body2 = '<div style="font-family:Arial,sans-serif;max-width:600px">'
        + '<h2 style="color:#B03A2E">⚠ Muestreos atrasados</h2>'
        + '<p>Producto: <strong>' + s.producto + '</strong> — Lote: <strong>' + s.lote + '</strong></p>'
        + '<p>Los siguientes puntos están <strong>atrasados</strong>:</p>'
        + '<ul>' + cpList2 + '</ul>'
        + '<p style="color:#5B6B6E;font-size:12px">Programa de Estabilidad — LCC / Vessena S.A.</p>'
        + '</div>';
      sendEmail_(s.emailAnalista, '⚠ ATRASADO: ' + s.producto + ' (Lote ' + s.lote + ')', body2);
      if (s.emailCreador && s.emailCreador !== s.emailAnalista) {
        sendEmail_(s.emailCreador, '⚠ ATRASADO: ' + s.producto + ' (Lote ' + s.lote + ')', body2);
      }
    }
  });
}`;

/* ============================================================
   CONFIG
============================================================ */
const ZONAS=[{z:'I',d:'Templada',l:'21°C±2/(45±5)%HR',a:'40°C±2/(75±5)%HR'},{z:'II',d:'Subtrop.',l:'25°C±2/(60±5)%HR',a:'40°C±2/(75±5)%HR'},{z:'III',d:'Caliente/Seca',l:'30°C±2/(35±5)%HR',a:'40°C±2/(75±5)%HR'},{z:'IV',d:'Tropical',l:'30°C±2/(75±5)%HR',a:'40°C±2/(75±5)%HR'}];
const NORMAS=[{id:'oms43',l:'OMS Informe 43/09'},{id:'cipac463',l:'CIPAC MT 46.3 (MSP)'},{id:'decreto148',l:'Decreto 148/015'},{id:'cosmeurope',l:'Cosmetics Europe 2004'},{id:'iso22716',l:'ISO 22716'}];

function cS(s){if(s.stage===5)return 5;if(s.approvedManually)return 5;const hs=!!(s.especificacion&&s.especificacion.trim());const any=s.checkpoints.some(c=>c.fechaReal);const all=s.checkpoints.length>0&&s.checkpoints.every(c=>c.fechaReal);const hc=!!(s.conclusion&&s.conclusion.trim());if(hc&&all)return 4;if(all)return 3;if(any)return 2;if(hs)return 1;return 0;}

async function loadAll(){const d=await gRead();if(d){if(d.productos)try{productos=JSON.parse(d.productos);}catch(e){}if(d.studies)try{studies=JSON.parse(d.studies);}catch(e){}}
  // Auto-fix en memoria + guardar si hay cambios
  let needsSave=false;
  studies.forEach(s=>{
    if(s.rechazos&&s.rechazos.length&&!s.approvedManually&&s.stage!==5){
      if(!s.rechazado){s.rechazado=true;needsSave=true;}
    }
    // Fix 4S → 3A (error de 4 semanas → correcto 3 meses)
    s.checkpoints.forEach(cp=>{
      if(cp.codigo==='4S'){
        cp.codigo='3A'; cp.mes=3; cp.fechaReal='';
        if(s.fechaInicio) cp.fechaProgramada=addM(s.fechaInicio,3);
        if(!cp.condiciones) cp.condiciones={estufa:emptyCondResult(),heladera:emptyCondResult(),luz:emptyCondResult(),patron:emptyCondResult()};
        if(!cp.fase) cp.fase='acelerada';
        needsSave=true;
      }
    });
    // Fix T0 sin fase
    if(s.checkpoints.length&&s.checkpoints[0].mes===0&&!s.checkpoints[0].fase&&(s.tipoLote==='desarrollo'||s.tipoLote==='startup'||s.tipoLote==='lanzamiento')){
      s.checkpoints[0].fase='compartido'; s.checkpoints[0].codigo='0'; needsSave=true;
    }
    // Fix acelerada sin condiciones
    s.checkpoints.forEach(cp=>{
      if(cp.mes>0&&!cp.condiciones&&(cp.codigo.includes('A')||cp.fase==='acelerada')){
        cp.condiciones={estufa:emptyCondResult(),heladera:emptyCondResult(),luz:emptyCondResult(),patron:emptyCondResult()};
        if(cp.activo||cp.ph||cp.viscosidad){
          cp.condiciones.patron={organoleptico:cp.organoleptico||'',ph:cp.ph||'',activo:cp.activo||'',viscosidad:cp.viscosidad||'',microbiologia:cp.microbiologia||'',homogeneidad:cp.homogeneidad||'',cumple:cp.cumple||'',observaciones:cp.observaciones||''};
        }
        if(!cp.fase) cp.fase='acelerada'; needsSave=true;
      }
    });
    // Fix lanzamiento → startup con fases naturales
    if(s.tipoLote==='lanzamiento'&&!s.checkpoints.some(c=>c.fase==='natural')){
      s.tipoLote='startup'; s.tipoEstudio='startup';
      const natMs=(s.categoria==='hipoclorito')?[6]:[12,24];
      natMs.forEach(m=>{if(!s.checkpoints.some(c=>c.mes===m)) s.checkpoints.push({codigo:`${m}N`,mes:m,fase:'natural',fechaProgramada:s.fechaInicio?addM(s.fechaInicio,m):'',fechaReal:''});});
      needsSave=true;
    }
  });
  if(needsSave) setTimeout(()=>saveStudies(),1500);
  // Forzar recálculo de etapas para todos los estudios
  let stageChanged=false;
  studies.forEach(s=>{
    if(s.rechazado||s.stage===5)return;
    const old=s.stage;
    s.stage=cS(s);
    if(s.stage!==old)stageChanged=true;
  });
  if(stageChanged&&!needsSave) setTimeout(()=>saveStudies(),2000);
}

function renderEstudios(){
  studies.forEach(rS);if(selSt&&studies.find(s=>s.id===selSt)){renderDetail();return;}
  const fl=studies.filter(s=>{
    if(s.rechazado)return false;
    if(filters.t&&s.tipoProducto!==filters.t)return false;
    if(filters.q&&!(s.producto+' '+s.lote).toLowerCase().includes(filters.q.toLowerCase()))return false;
    // Dashboard KPI filters
    if(dashFilter==='curso')return s.stage>=1&&s.stage<=2;
    if(dashFilter==='proximos')return s.checkpoints.some(c=>!c.fechaReal&&dTo(c.fechaProgramada)>=0&&dTo(c.fechaProgramada)<=7);
    if(dashFilter==='atrasados')return s.checkpoints.some(c=>!c.fechaReal&&dTo(c.fechaProgramada)<0);
    if(dashFilter==='aprobados')return s.stage===5;
    if(dashFilter==='pendinf')return s.stage===3;
    if(dashFilter==='pendaprob')return s.stage===4;
    return true;});
  document.getElementById('mc').innerHTML=`<div class="panel pp">
    ${dashFilter?`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:8px 12px;background:var(--tt);border:1px solid var(--teal);border-radius:8px;font-size:13px"><strong>Filtro:</strong> ${{curso:'En curso (muestreos)',proximos:'Próximos (≤7 días)',atrasados:'Atrasados',aprobados:'Aprobados',pendinf:'Completos → sin informe',pendaprob:'Informe → pend. aprobación'}[dashFilter]} (${fl.length}) <div class="spacer"></div><button class="btn sm ghost" id="clearF">✕ Limpiar</button></div>`:''}
    <div class="toolbar"><select id="fT"><option value="">Todos</option><option value="domisanitario" ${filters.t==='domisanitario'?'selected':''}>Domisanitarios</option><option value="cosmetico" ${filters.t==='cosmetico'?'selected':''}>Cosméticos</option></select><input type="text" id="fQ" placeholder="Buscar…" value="${E(filters.q)}"><div class="spacer"></div><button class="btn" id="gN">+ Nuevo</button></div>
  ${fl.length?`<table><thead><tr><th>Producto</th><th>Lote</th><th>Analista</th><th>Etapa</th><th>Próximo</th></tr></thead><tbody>${fl.map(s=>{const p=s.checkpoints.filter(c=>cpS(c)!=='realizado').sort((a,b)=>a.fechaProgramada.localeCompare(b.fechaProgramada))[0];return`<tr class="ck" data-go="${s.id}"><td><strong>${E(s.producto)}</strong>${s.tipoLote==='desarrollo'?' <span class="tag pendiente" style="font-size:9px">DESARROLLO</span>':s.tipoLote==='lanzamiento'?' <span class="tag proximo" style="font-size:9px">LANZAMIENTO</span>':''}</td><td class="mono">${E(s.lote)}</td><td>${(()=>{const t=TEAM.find(t=>t.e===s.emailAnalista);return t?E(t.n):E(s.emailAnalista||'—');})()}</td><td><span class="bs"><span class="dot"></span>${E(SG[s.stage].l)}</span></td><td>${p?`<span class="sp">${E(p.codigo)}</span> <span class="tag ${cpS(p)}">${sL(cpS(p))}</span>`:'<span class="tag realizado">OK</span>'}</td></tr>`;}).join('')}</tbody></table>`:`<div class="empty"><div class="big">🧪</div>Sin estudios.</div>`}</div>`;
  q('#fT').onchange=e=>{filters.t=e.target.value;render();};q('#fQ').oninput=e=>{filters.q=e.target.value;render();};q('#gN').onclick=()=>{dashFilter='';activeTab='nuevo';render();};
  const cf=q('#clearF');if(cf)cf.onclick=()=>{dashFilter='';render();};
  bind('[data-go]','click',el=>{dashFilter='';selSt=el.dataset.go;render();});
}

    <div class="panel pp"><h2 class="st">Muestreos <span class="rb analista">Analista</span>${s.tipoLote==='startup'?' <span class="tipo-badge acel">ACEL.</span><span class="tipo-badge nat">NAT.</span>':s.tipoLote==='desarrollo'?' <span class="tipo-badge acel">DESARROLLO</span>':s.tipoEstudio?` <span class="tipo-badge ${s.tipoEstudio==='acelerada'?'acel':'nat'}">${s.tipoEstudio==='acelerada'?'ACELERADA':'NATURAL'}</span>`:''}</h2>
    ${s.rechazado?'<div style="background:var(--rt);border:1px solid var(--red);border-radius:8px;padding:8px 14px;margin-bottom:12px;font-size:13px;color:var(--red);font-weight:600">⛔ Estudio rechazado.</div>':''}
    ${(()=>{
      const hasFases = s.checkpoints.some(c=>c.fase);
      if(hasFases){
        const compartidos = s.checkpoints.filter(c=>c.fase==='compartido');
        const acels = s.checkpoints.filter(c=>c.fase==='acelerada');
        const nats = s.checkpoints.filter(c=>c.fase==='natural');
        let h = '';
        // T0 compartido
        if(compartidos.length){
          h += '<div style="margin-bottom:14px"><h3 style="font-size:13px;color:var(--ink);margin:0 0 8px 0">T0 — Medición inicial (compartida)</h3>';
          h += compartidos.map((cp,idx)=>{const i=s.checkpoints.indexOf(cp);const st=s.rechazado?'atrasado':cpS(cp);
            return renderFlatCp(cp,i,st,s.rechazado);}).join('');
          h += '</div>';
        }
        // Acelerada
        if(acels.length){
          h += '<details open style="margin-bottom:14px"><summary style="cursor:pointer;font-size:14px;font-weight:700;color:var(--amber);padding:8px 0;user-select:none">▸ Etapa Acelerada <span style="font-size:12px;font-weight:400;color:var(--ink2)">(3 meses · 4 condiciones: 40°C, 4°C, Luz, Patrón)</span></summary>';
          h += acels.map(cp=>{const i=s.checkpoints.indexOf(cp);const st=s.rechazado?'atrasado':cpS(cp);
            if(!cp.condiciones)cp.condiciones={estufa:emptyCondResult(),heladera:emptyCondResult(),luz:emptyCondResult(),patron:emptyCondResult()};
            if(!cp.condiciones.estufa)cp.condiciones={estufa:emptyCondResult(),heladera:emptyCondResult(),luz:emptyCondResult(),patron:emptyCondResult()};
            return renderCondCp(cp,i,st,s.rechazado);}).join('');
          h += '</details>';
        }
        // Natural
        if(nats.length){
          h += '<details open style="margin-bottom:14px"><summary style="cursor:pointer;font-size:14px;font-weight:700;color:var(--teal);padding:8px 0;user-select:none">▸ Etapa Natural <span style="font-size:12px;font-weight:400;color:var(--ink2)">(condiciones de almacenamiento)</span></summary>';
          h += nats.map(cp=>{const i=s.checkpoints.indexOf(cp);const st=s.rechazado?'atrasado':cpS(cp);
            return renderFlatCp(cp,i,st,s.rechazado);}).join('');
          h += '<button class="btn ghost sm" data-addnat="1">+ Punto natural</button>';
          h += '</details>';
        }
        return h;
      } else {
        // Legacy: flat checkpoints
        let h = s.checkpoints.map((cp,i)=>{
          const st=s.rechazado?'atrasado':cpS(cp);
          if(cp.condiciones) return renderCondCp(cp,i,st,s.rechazado);
          return renderFlatCp(cp,i,st,s.rechazado);
        }).join('');
        if(s.tipoEstudio!=='acelerada') h+='<button class="btn ghost sm" id="addCp">+ Punto</button>';
        return h;
      }
    })()}</div>
    <div class="panel pp"><h2 class="st">Informe</h2>
    ${tfs('Alcance','alcance',s.alcance,'tfA')}${tfs('Métodos','metodos',s.metodosAnaliticos,'tfM')}${tfs('Criterios','criterios',s.criteriosAceptacion,'tfCr')}
    <fieldset><legend>Conclusión</legend><div class="fg c3" style="margin-bottom:8px"><div class="fw"><label class="fi">Vida útil (meses)</label><input type="number" id="tfVU" value="${E(s.vidaUtilMeses||'')}"></div><div class="fw"><label class="fi">Cond. almac.</label><input type="text" id="tfCA" value="${E(s.condAlm||'')}"></div></div>
    <div class="tb">${Object.keys(TPL.conclusion).map(k=>`<button class="tc" data-tpl="conclusion" data-k="${k}">${CHL[k]||k}</button>`).join('')}</div><textarea id="tfCo" rows="3">${E(s.conclusion||'')}</textarea></fieldset>
    ${tfs('Rotulación','rotulacion',s.rotulacion,'tfR')}
    <div style="display:flex;gap:10px;margin-top:6px"><button class="btn" id="bSI">Guardar informe</button><button class="btn ghost" id="bVI">Ver informe →</button></div></div>`;

  q('#back').onclick=()=>{selSt=null;render();};
  q('#bDl').onclick=async()=>{if(confirm('¿Eliminar?')){studies=studies.filter(x=>x.id!==s.id);selSt=null;await saveStudies();render();}};
  const ap2=q('#bAp');if(ap2)ap2.onclick=async()=>{
    if(!confirm('¿Aprobar este estudio como Dir. Técnica?'))return;
    s.approvedManually=true;s.fechaAprobacion=td2();s.stage=5;s.rechazado=false;
    await saveStudies();
    // Email al analista
    if(s.emailAnalista){
      const body='<div style="font-family:Arial;max-width:600px"><h2 style="color:#357A55">✓ Estudio APROBADO</h2><p>Producto: <strong>'+s.producto+'</strong> — Lote: <strong>'+s.lote+'</strong></p><p>El estudio fue aprobado por Dirección Técnica el '+s.fechaAprobacion+'.</p><p style="color:#5B6B6E;font-size:12px">Programa de Estabilidad — LCC / Vessena S.A.</p></div>';
      await gSendEmail(s.emailAnalista,'✓ APROBADO: '+s.producto+' (Lote '+s.lote+')',body);
    }
    render();toast('Estudio aprobado');
  };
  const rej=q('#bRej');if(rej)rej.onclick=async()=>{
    const motivo=prompt('Motivo del rechazo:');
    if(!motivo)return;
    if(!s.rechazos)s.rechazos=[];
    s.rechazos.push({fecha:td2(),motivo,por:'claudia.barlocco@vessena.com.uy'});
    s.rechazado=true;
    s.stage=2; // vuelve a muestreos para corrección
    s.approvedManually=false;
    s.conclusion=''; // limpiar conclusión para que rehagan
    await saveStudies();
    // Email al analista y creador
    const body2='<div style="font-family:Arial;max-width:600px"><h2 style="color:#B03A2E">✗ Estudio RECHAZADO</h2><p>Producto: <strong>'+s.producto+'</strong> — Lote: <strong>'+s.lote+'</strong></p><p><strong>Motivo:</strong> '+motivo+'</p><p>Corregir y volver a enviar el informe.</p><p style="color:#5B6B6E;font-size:12px">Programa de Estabilidad — LCC / Vessena S.A.</p></div>';
    if(s.emailAnalista)await gSendEmail(s.emailAnalista,'✗ RECHAZADO: '+s.producto+' (Lote '+s.lote+')',body2);
    if(s.emailCreador&&s.emailCreador!==s.emailAnalista)await gSendEmail(s.emailCreador,'✗ RECHAZADO: '+s.producto+' (Lote '+s.lote+')',body2);
    render();toast('Estudio rechazado — notificación enviada');
  };
  q('#bSvMail').onclick=async()=>{s.emailAnalista=q('#eAn').value.trim();s.emailCreador=q('#eCr').value.trim();await saveStudies();toast('Emails guardados');};
  q('#bSendAssign').onclick=async()=>{
    s.emailAnalista=q('#eAn').value.trim();s.emailCreador=q('#eCr').value.trim();
    if(!s.emailAnalista){toast('Completá el email del analista');return;}
    await saveStudies();
    const body=buildAssignEmail(s);
    await gSendEmail(s.emailAnalista,'Asignación: '+s.producto+' (Lote '+s.lote+')',body);
  };
  document.querySelectorAll('[data-cp]').forEach(el=>el.onchange=async()=>{
    const i=parseInt(el.dataset.cp),f=el.dataset.f,cond=el.dataset.cond;
    if(cond){
      // Campo dentro de una condición acelerada
      if(!s.checkpoints[i].condiciones)s.checkpoints[i].condiciones={estufa:emptyCondResult(),heladera:emptyCondResult(),luz:emptyCondResult(),patron:emptyCondResult()};
      if(!s.checkpoints[i].condiciones[cond])s.checkpoints[i].condiciones[cond]=emptyCondResult();
      s.checkpoints[i].condiciones[cond][f]=el.value;
    } else {
      // Campo normal (natural o fecha)
      s.checkpoints[i][f]=el.value;
    }
    rS(s);await saveStudies();if(f==='fechaReal')render();
  });
  const addCpBtn=q('#addCp');if(addCpBtn)addCpBtn.onclick=async()=>{const lm=s.checkpoints.length?s.checkpoints[s.checkpoints.length-1].mes:0;s.checkpoints.push({codigo:`${lm+3}N`,mes:lm+3,fechaProgramada:addM(s.fechaInicio,lm+3),fechaReal:''});await saveStudies();render();};
  const addNatBtn=q('[data-addnat]');if(addNatBtn)addNatBtn.onclick=async()=>{const nats=s.checkpoints.filter(c=>c.fase==='natural');const lm=nats.length?nats[nats.length-1].mes:0;const nm=lm+3;s.checkpoints.push({codigo:`${nm}N`,mes:nm,fase:'natural',fechaProgramada:addM(s.fechaInicio,nm),fechaReal:''});await saveStudies();render();};
  document.querySelectorAll('.tc').forEach(ch=>ch.onclick=()=>{s.vidaUtilMeses=q('#tfVU')?.value||s.vidaUtilMeses;s.condAlm=q('#tfCA')?.value||s.condAlm;const txt=xT(TPL[ch.dataset.tpl][ch.dataset.k],s);const map={alcance:'tfA',metodos:'tfM',criterios:'tfCr',conclusion:'tfCo',rotulacion:'tfR'};const ta=q('#'+map[ch.dataset.tpl]);if(ta)ta.value=ta.value.trim()?ta.value.trim()+'\n'+txt:txt;});
  q('#bSI').onclick=async()=>{s.alcance=q('#tfA').value;s.metodosAnaliticos=q('#tfM').value;s.criteriosAceptacion=q('#tfCr').value;s.conclusion=q('#tfCo').value;s.rotulacion=q('#tfR').value;s.vidaUtilMeses=q('#tfVU')?.value||'';s.condAlm=q('#tfCA')?.value||'';rS(s);await saveStudies();render();toast('Guardado');};
  q('#bVI').onclick=()=>{selRep=s.id;activeTab='informe';render();};
}
function tfs(t,sec,val,id){return`<fieldset><legend>${t}</legend><div class="tb">${Object.keys(TPL[sec]).map(k=>`<button class="tc" data-tpl="${sec}" data-k="${k}">${CHL[k]||k}</button>`).join('')}</div><textarea id="${id}" rows="2">${E(val||'')}</textarea></fieldset>`;}

  <div class="fg c3">

      <div class="fw"><label class="fi">Tu email (alertas)</label>${emailSel('nEC','')}</div>

  </fieldset>

  <fieldset><legend>Qué se va a crear</legend><div id="fP"></div></fieldset>

  function rP2(){const p=productos.find(p=>p.id===q('#nP').value);if(!p)return;q('#spP').innerHTML=(p.params||[]).length?`<div class="spv"><table><thead><tr><th>Param</th><th>Espec.</th><th>Método</th></tr></thead><tbody>${p.params.map(s=>`<tr><td><strong>${E(s.p)}</strong></td><td>${E(s.e)}</td><td>${E(s.m)}</td></tr>`).join('')}</tbody></table></div>`:'';}

      html=`<div class="an" style="margin-bottom:10px"><span class="icon">🧪</span> <strong>Desarrollo:</strong> se crea 1 estudio acelerado (0 + 3 meses, 4 condiciones: 40°C, 4°C, Luz, Patrón).</div>
      <table><thead><tr><th>Estudio</th><th>Código</th><th>Mes</th><th>Fecha</th></tr></thead><tbody>
      <tr><td rowspan="2"><span class="tipo-badge acel">ACELERADA</span></td><td><span class="sp">0A</span></td><td>0</td><td>${fmt(fi)}</td></tr>
      <tr><td><span class="sp">3A</span></td><td>3</td><td>${fmt(addM(fi,3))}</td></tr></tbody></table>`;

  <h3>7. Criterios</h3><p style="white-space:pre-line">${E(s.criteriosAceptacion||'—')}</p>
  <h3>8. Conclusión</h3><p style="white-space:pre-line">${E(s.conclusion||'—')}</p>
  <h3>9. Rotulación</h3><p style="white-space:pre-line">${E(s.rotulacion||'No aplica')}</p>
  <h3>10. Aprobación</h3><div class="kv"><div class="k">Estado</div><div>${E(SG[s.stage].l)}</div></div><div class="kv"><div class="k">Dir. Técnica</div><div>${s.stage===5?'Aprobado':'Pendiente'}</div></div>
  <div style="margin-top:40px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:30px;font-size:12px;color:var(--ink2)"><div style="border-top:1px solid var(--line);padding-top:6px">Preparado por<br><br></div><div style="border-top:1px solid var(--line);padding-top:6px">Revisado por<br><br></div><div style="border-top:1px solid var(--line);padding-top:6px">Aprobado por<br><br></div></div></div>`;
  q('#rS').onchange=e=>{selRep=e.target.value;render();};q('#bP').onclick=()=>window.print();
}

/* RECHAZADOS */
function renderRechazados(){
  const rech=studies.filter(s=>s.rechazado);
  document.getElementById('mc').innerHTML=`<div class="panel pp">
    <h2 class="st">Estudios rechazados</h2>
    <p class="sd">Estudios rechazados por Dir. Técnica. Se pueden reactivar desde el detalle.</p>
    ${rech.length?`<table><thead><tr><th>Producto</th><th>Lote</th><th>Fecha rechazo</th><th>Motivo</th><th></th></tr></thead>
    <tbody>${rech.map(s=>{const lastR=s.rechazos&&s.rechazos.length?s.rechazos[s.rechazos.length-1]:{};
    return`<tr><td><strong>${E(s.producto)}</strong></td><td class="mono">${E(s.lote)}</td><td>${E(lastR.fecha||'—')}</td><td style="max-width:300px">${E(lastR.motivo||'—')}</td><td><button class="btn sm ghost" data-react="${s.id}">Reactivar</button> <button class="btn sm ghost" data-ver="${s.id}">Ver</button></td></tr>`;}).join('')}</tbody></table>`:`<div class="empty"><div class="big">✓</div>No hay estudios rechazados.</div>`}</div>`;
  bind('[data-react]','click',async el=>{
    const s=studies.find(x=>x.id===el.dataset.react);if(!s)return;
    if(!confirm('¿Reactivar este estudio? Vuelve a Muestreos.'))return;
    s.rechazado=false;s.stage=2;await saveStudies();render();toast('Estudio reactivado');
  });
  bind('[data-ver]','click',el=>{selSt=el.dataset.ver;activeTab='estudios';render();});
}
