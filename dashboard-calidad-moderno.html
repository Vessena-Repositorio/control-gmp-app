<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Calidad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:#0f1729;
    --bg-2:#1a1f3a;
    --bg-3:#2d1b4e;
    --text:#1a1d2e;
    --text-soft:#5a6178;
    --text-mute:#8b91a8;
    --white:rgba(255,255,255,.85);
    --glass:rgba(255,255,255,.55);
    --glass-strong:rgba(255,255,255,.75);
    --glass-border:rgba(255,255,255,.5);
    --shadow-glass:0 8px 32px rgba(31,38,135,.12), inset 0 1px 0 rgba(255,255,255,.6);
    --shadow-hover:0 20px 50px rgba(31,38,135,.25), inset 0 1px 0 rgba(255,255,255,.7);

    /* COLORES POR CATEGORÍA */
    --c-gmp-1:#667eea; --c-gmp-2:#764ba2;
    --c-aud-1:#f093fb; --c-aud-2:#f5576c;
    --c-doc-1:#4facfe; --c-doc-2:#00f2fe;
    --c-kpi-1:#43e97b; --c-kpi-2:#38f9d7;
    --c-lcc-1:#fa709a; --c-lcc-2:#fee140;
    --c-dev-1:#a8edea; --c-dev-2:#fed6e3;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}

  body{
    font-family:'Inter',-apple-system,sans-serif;
    color:var(--text);
    min-height:100vh;
    background:
      radial-gradient(circle at 0% 0%, #fce4ec 0%, transparent 50%),
      radial-gradient(circle at 100% 0%, #ffe5e5 0%, transparent 50%),
      radial-gradient(circle at 50% 100%, #f3e8ff 0%, transparent 50%),
      linear-gradient(135deg, #fef3f9 0%, #fff5f5 50%, #f0e8ff 100%);
    background-attachment:fixed;
    overflow-x:hidden;
    position:relative;
  }

  /* Orbes de fondo flotando */
  body::before, body::after{
    content:'';
    position:fixed;
    border-radius:50%;
    filter:blur(80px);
    z-index:0;
    pointer-events:none;
    animation:float 20s infinite ease-in-out;
  }
  body::before{
    width:500px;height:500px;
    background:linear-gradient(135deg, #c41e3a, #7a0d1f);
    opacity:.18;
    top:-200px;left:-200px;
  }
  body::after{
    width:600px;height:600px;
    background:linear-gradient(135deg, #f093fb, #4facfe);
    opacity:.2;
    bottom:-300px;right:-200px;
    animation-delay:-10s;
  }
  @keyframes float{
    0%,100%{transform:translate(0,0) scale(1)}
    50%{transform:translate(40px,-40px) scale(1.1)}
  }

  /* HEADER */
  header{
    position:relative;
    z-index:10;
    padding:2rem;
  }
  .header-inner{
    max-width:1320px;
    margin:0 auto;
    background:var(--glass);
    backdrop-filter:blur(24px) saturate(180%);
    -webkit-backdrop-filter:blur(24px) saturate(180%);
    border:1px solid var(--glass-border);
    border-radius:24px;
    padding:1.5rem 2rem;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:1.5rem;
    flex-wrap:wrap;
    box-shadow:var(--shadow-glass);
  }
  .brand{
    display:flex;
    align-items:center;
    gap:1rem;
  }
  .brand-mark{
    width:auto;
    min-width:140px;
    max-width:180px;
    height:54px;
    border-radius:14px;
    background:linear-gradient(135deg, #1a1d2e, #2d1f3e);
    display:grid;
    place-items:center;
    box-shadow:0 8px 20px rgba(26,29,46,.35);
    position:relative;
    overflow:hidden;
    padding:0 1rem;
  }
  .brand-mark img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    display:block;
  }
  .brand-text .eyebrow{
    font-size:.7rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--text-soft);
    font-weight:600;
    margin-bottom:.15rem;
  }
  .brand-text h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:1.5rem;
    letter-spacing:-.02em;
    background:linear-gradient(135deg, #1a1d2e, #c41e3a);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    line-height:1;
  }
  .header-date{
    font-size:.85rem;
    color:var(--text-soft);
    display:flex;
    align-items:center;
    gap:.5rem;
  }
  .header-date::before{
    content:'';
    width:8px;height:8px;
    border-radius:50%;
    background:#43e97b;
    box-shadow:0 0 0 4px rgba(67,233,123,.2);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 4px rgba(67,233,123,.2)}
    50%{box-shadow:0 0 0 8px rgba(67,233,123,.05)}
  }

  /* SEARCH */
  .search-section{
    max-width:1320px;
    margin:0 auto;
    padding:0 2rem 2rem;
    position:relative;
    z-index:10;
  }
  .search-glass{
    background:var(--glass);
    backdrop-filter:blur(24px) saturate(180%);
    -webkit-backdrop-filter:blur(24px) saturate(180%);
    border:1px solid var(--glass-border);
    border-radius:20px;
    padding:1rem;
    display:flex;
    gap:.75rem;
    align-items:center;
    flex-wrap:wrap;
    box-shadow:var(--shadow-glass);
  }
  .search-wrap{
    flex:1;
    min-width:240px;
    position:relative;
  }
  .search-wrap svg{
    position:absolute;
    left:1.25rem;
    top:50%;
    transform:translateY(-50%);
    color:var(--text-mute);
    pointer-events:none;
  }
  #search{
    width:100%;
    padding:.9rem 1rem .9rem 3rem;
    background:rgba(255,255,255,.5);
    border:1px solid rgba(255,255,255,.6);
    border-radius:14px;
    color:var(--text);
    font-family:inherit;
    font-size:.95rem;
    outline:none;
    transition:all .3s;
  }
  #search::placeholder{color:var(--text-mute)}
  #search:focus{
    background:rgba(255,255,255,.85);
    border-color:#c41e3a;
    box-shadow:0 0 0 4px rgba(196,30,58,.15);
  }
  .filter-tabs{
    display:flex;
    gap:.4rem;
    flex-wrap:wrap;
  }
  .filter-tab{
    background:rgba(255,255,255,.5);
    border:1px solid rgba(255,255,255,.6);
    color:var(--text-soft);
    padding:.7rem 1.1rem;
    border-radius:12px;
    font-family:inherit;
    font-size:.85rem;
    font-weight:600;
    cursor:pointer;
    transition:all .25s;
  }
  .filter-tab:hover{background:rgba(255,255,255,.8);transform:translateY(-1px)}
  .filter-tab.active{
    background:linear-gradient(135deg, #c41e3a, #7a0d1f);
    border-color:transparent;
    color:white;
    box-shadow:0 6px 16px rgba(196,30,58,.35);
  }

  /* MAIN */
  main{
    max-width:1320px;
    margin:0 auto;
    padding:0 2rem 4rem;
    position:relative;
    z-index:10;
  }

  /* STATS */
  .stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:1rem;
    margin-bottom:3rem;
  }
  .stat{
    background:var(--glass);
    backdrop-filter:blur(24px) saturate(180%);
    -webkit-backdrop-filter:blur(24px) saturate(180%);
    border:1px solid var(--glass-border);
    border-radius:20px;
    padding:1.5rem;
    position:relative;
    overflow:hidden;
    box-shadow:var(--shadow-glass);
    transition:transform .3s;
  }
  .stat:hover{transform:translateY(-3px)}
  .stat::before{
    content:'';
    position:absolute;
    top:-20px;right:-20px;
    width:80px;height:80px;
    border-radius:50%;
    background:var(--stat-grad, linear-gradient(135deg, #667eea, #764ba2));
    opacity:.15;
    filter:blur(20px);
  }
  .stat:nth-child(1){--stat-grad:linear-gradient(135deg, #c41e3a, #7a0d1f)}
  .stat:nth-child(2){--stat-grad:linear-gradient(135deg, #f093fb, #f5576c)}
  .stat:nth-child(3){--stat-grad:linear-gradient(135deg, #43e97b, #38f9d7)}
  .stat:nth-child(4){--stat-grad:linear-gradient(135deg, #4facfe, #00f2fe)}

  .stat-label{
    font-size:.72rem;
    letter-spacing:.15em;
    text-transform:uppercase;
    color:var(--text-soft);
    margin-bottom:.6rem;
    font-weight:600;
  }
  .stat-value{
    font-family:'Space Grotesk',sans-serif;
    font-size:2.5rem;
    font-weight:700;
    color:var(--text);
    line-height:1;
    letter-spacing:-.03em;
    background:var(--stat-grad);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .stat-sub{
    font-size:.78rem;
    color:var(--text-mute);
    margin-top:.5rem;
  }

  /* CATEGORÍAS */
  .category{
    margin-bottom:3rem;
    animation:fadeUp .7s ease backwards;
  }
  .category:nth-child(1){animation-delay:.05s}
  .category:nth-child(2){animation-delay:.12s}
  .category:nth-child(3){animation-delay:.19s}
  .category:nth-child(4){animation-delay:.26s}
  .category:nth-child(5){animation-delay:.33s}
  .category:nth-child(6){animation-delay:.4s}

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(24px)}
    to{opacity:1;transform:translateY(0)}
  }

  .category-header{
    display:flex;
    align-items:center;
    gap:1rem;
    margin-bottom:1.25rem;
    cursor:pointer;
    user-select:none;
    padding:.5rem;
    margin-left:-.5rem;
    border-radius:14px;
    transition:background .2s;
  }
  .category-header:hover{background:rgba(255,255,255,.4)}
  .category-chevron{
    width:32px;
    height:32px;
    border-radius:10px;
    background:rgba(255,255,255,.6);
    display:grid;
    place-items:center;
    color:var(--text-soft);
    transition:transform .35s cubic-bezier(.4,0,.2,1);
    flex-shrink:0;
  }
  .category.collapsed .category-chevron{transform:rotate(-90deg)}
  .category.collapsed .grid{
    max-height:0;
    opacity:0;
    margin:0;
    overflow:hidden;
    pointer-events:none;
  }
  .grid{
    transition:max-height .4s cubic-bezier(.4,0,.2,1), opacity .3s;
    max-height:5000px;
    opacity:1;
    overflow:hidden;
  }

  /* CONTROLES GLOBALES expand/collapse all */
  .global-controls{
    display:flex;
    justify-content:flex-end;
    gap:.5rem;
    margin-bottom:1rem;
  }
  .global-btn{
    background:var(--glass);
    backdrop-filter:blur(20px);
    border:1px solid var(--glass-border);
    color:var(--text-soft);
    padding:.55rem 1rem;
    border-radius:10px;
    font-family:inherit;
    font-size:.78rem;
    font-weight:600;
    cursor:pointer;
    transition:all .2s;
    display:inline-flex;
    align-items:center;
    gap:.4rem;
  }
  .global-btn:hover{
    background:var(--glass-strong);
    color:var(--text);
    transform:translateY(-1px);
  }
  .category-badge{
    width:48px;
    height:48px;
    border-radius:14px;
    display:grid;
    place-items:center;
    color:white;
    box-shadow:0 8px 20px var(--cat-shadow, rgba(102,126,234,.35));
    background:var(--cat-grad, linear-gradient(135deg, #667eea, #764ba2));
    flex-shrink:0;
  }
  .category-title-wrap{flex:1;min-width:0}
  .category-title-wrap h2{
    font-family:'Space Grotesk',sans-serif;
    font-size:1.5rem;
    font-weight:700;
    color:var(--text);
    letter-spacing:-.02em;
    line-height:1.2;
  }
  .category-count{
    font-size:.78rem;
    color:var(--text-mute);
    font-weight:500;
    margin-top:.15rem;
  }

  /* GRID */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
    gap:1rem;
  }

  /* CARD */
  .card{
    background:var(--glass);
    backdrop-filter:blur(24px) saturate(180%);
    -webkit-backdrop-filter:blur(24px) saturate(180%);
    border:1px solid var(--glass-border);
    border-radius:20px;
    padding:1.5rem;
    cursor:pointer;
    transition:all .4s cubic-bezier(.2,.8,.2,1);
    position:relative;
    text-decoration:none;
    color:inherit;
    display:flex;
    flex-direction:column;
    min-height:180px;
    overflow:hidden;
    box-shadow:var(--shadow-glass);
  }
  .card::before{
    content:'';
    position:absolute;
    top:-50%;right:-50%;
    width:200%;height:200%;
    background:radial-gradient(circle, var(--cat-glow, rgba(102,126,234,.2)) 0%, transparent 50%);
    opacity:0;
    transition:opacity .4s;
    pointer-events:none;
  }
  .card:hover{
    transform:translateY(-6px) scale(1.01);
    box-shadow:var(--shadow-hover);
    background:var(--glass-strong);
  }
  .card:hover::before{opacity:1}

  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:1.25rem;
    position:relative;
    z-index:1;
  }
  .card-icon{
    width:56px;
    height:56px;
    border-radius:16px;
    display:grid;
    place-items:center;
    color:white;
    background:var(--cat-grad, linear-gradient(135deg, #667eea, #764ba2));
    box-shadow:0 8px 20px var(--cat-shadow, rgba(102,126,234,.35));
    transition:transform .4s cubic-bezier(.2,.8,.2,1);
    position:relative;
  }
  .card-icon::after{
    content:'';
    position:absolute;
    inset:0;
    border-radius:16px;
    background:linear-gradient(135deg, rgba(255,255,255,.3), transparent);
  }
  .card:hover .card-icon{transform:rotate(-8deg) scale(1.08)}

  .card h3{
    font-family:'Space Grotesk',sans-serif;
    font-size:1.15rem;
    font-weight:700;
    color:var(--text);
    margin-bottom:.4rem;
    line-height:1.25;
    letter-spacing:-.01em;
    position:relative;
    z-index:1;
  }
  .card p{
    font-size:.85rem;
    color:var(--text-soft);
    line-height:1.5;
    flex:1;
    position:relative;
    z-index:1;
  }
  .card-foot{
    margin-top:1rem;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:.78rem;
    font-weight:600;
    color:var(--text-soft);
    position:relative;
    z-index:1;
  }
  .card-foot .arrow{
    width:30px;height:30px;
    border-radius:50%;
    background:rgba(255,255,255,.6);
    display:grid;
    place-items:center;
    transition:all .3s;
    color:var(--text);
  }
  .card:hover .card-foot .arrow{
    background:var(--cat-grad, linear-gradient(135deg, #667eea, #764ba2));
    color:white;
    transform:translateX(4px);
  }

  /* PLACEHOLDER */
  .card-placeholder{
    background:rgba(255,255,255,.3);
    border:1.5px dashed rgba(139,145,168,.4);
    cursor:default;
  }
  .card-placeholder:hover{
    transform:none;
    box-shadow:var(--shadow-glass);
    background:rgba(255,255,255,.3);
  }
  .card-placeholder:hover::before{opacity:0}
  .card-placeholder:hover .card-icon{transform:none}
  .card-placeholder h3{color:var(--text-soft)}
  .card-placeholder .card-icon{opacity:.6}
  .badge-soon{
    display:inline-block;
    font-size:.62rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    background:rgba(255,255,255,.6);
    color:var(--text-soft);
    padding:.3rem .65rem;
    border-radius:8px;
    font-weight:700;
    margin-bottom:.6rem;
    border:1px solid rgba(255,255,255,.5);
  }

  /* COLORES POR CATEGORÍA */
  .cat-gmp{
    --cat-grad:linear-gradient(135deg, #c41e3a, #7a0d1f);
    --cat-shadow:rgba(196,30,58,.35);
    --cat-glow:rgba(196,30,58,.2);
  }
  .cat-aud{
    --cat-grad:linear-gradient(135deg, #f093fb, #f5576c);
    --cat-shadow:rgba(245,87,108,.35);
    --cat-glow:rgba(240,147,251,.2);
  }
  .cat-doc{
    --cat-grad:linear-gradient(135deg, #4facfe, #00f2fe);
    --cat-shadow:rgba(79,172,254,.35);
    --cat-glow:rgba(79,172,254,.2);
  }
  .cat-kpi{
    --cat-grad:linear-gradient(135deg, #43e97b, #38f9d7);
    --cat-shadow:rgba(67,233,123,.35);
    --cat-glow:rgba(67,233,123,.2);
  }
  .cat-lcc{
    --cat-grad:linear-gradient(135deg, #fa709a, #fee140);
    --cat-shadow:rgba(250,112,154,.35);
    --cat-glow:rgba(250,112,154,.2);
  }
  .cat-dev{
    --cat-grad:linear-gradient(135deg, #30cfd0, #330867);
    --cat-shadow:rgba(48,207,208,.35);
    --cat-glow:rgba(48,207,208,.2);
  }

  /* EMPTY */
  .empty{
    text-align:center;
    padding:4rem 2rem;
    color:var(--text-soft);
    font-size:1.05rem;
    font-weight:500;
    display:none;
    background:var(--glass);
    backdrop-filter:blur(24px);
    border:1px solid var(--glass-border);
    border-radius:20px;
  }
  .empty.show{display:block}

  /* FOOTER */
  footer{
    max-width:1320px;
    margin:0 auto;
    padding:0 2rem 2rem;
    text-align:center;
    color:var(--text-mute);
    font-size:.8rem;
    position:relative;
    z-index:10;
  }
  footer .heart{color:#f5576c}

  /* MOBILE */
  @media (max-width:640px){
    header{padding:1rem}
    .header-inner{padding:1rem 1.25rem;border-radius:18px}
    .brand-text h1{font-size:1.2rem}
    .search-section{padding:0 1rem 1.5rem}
    main{padding:0 1rem 3rem}
    .grid{grid-template-columns:1fr}
    .stat-value{font-size:2rem}
    .category-title-wrap h2{font-size:1.25rem}
  }
</style>
</head>
<body>

<header>

      if (filteredItems.length === 0) return;
      visibleCount += filteredItems.length;

      const realCount = cat.items.filter(i=>!i.placeholder).length;
      const section = document.createElement('section');
      // Por defecto colapsadas (excepto si hay búsqueda activa)
      const isCollapsed = !currentSearch && (collapsedCategories.has(cat.id) || (collapsedCategories.size === 0 && !expandedByDefault));
      section.className = `category ${cat.colorClass}${isCollapsed ? ' collapsed' : ''}`;
      section.dataset.catId = cat.id;
      section.innerHTML = `
        <div class="category-header">
          <div class="category-badge">${getBadgeIcon(cat.id)}</div>
          <div class="category-title-wrap">
            <h2>${cat.title}</h2>
            <div class="category-count">${realCount} ${realCount === 1 ? 'recurso disponible' : 'recursos disponibles'}</div>
          </div>
          <div class="category-chevron">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
        <div class="grid"></div>
      `;
      // Click en header para toggle
      section.querySelector('.category-header').addEventListener('click', () => {
        section.classList.toggle('collapsed');
        if (section.classList.contains('collapsed')) collapsedCategories.add(cat.id);
        else collapsedCategories.delete(cat.id);
      });
      const grid = section.querySelector('.grid');

      filteredItems.forEach(item => {
        if (item.placeholder){
          const ph = document.createElement('div');
          ph.className = 'card card-placeholder';
          ph.innerHTML = `
            <div class="card-top">
              <div class="card-icon">${icons.soon}</div>
            </div>
            <span class="badge-soon">En desarrollo</span>
            <h3>${item.name}</h3>
            <p>${item.desc}</p>
          `;
          grid.appendChild(ph);
        } else {
          const a = document.createElement('a');
          a.className = 'card';
          a.href = item.url;
          a.target = '_blank';
          a.rel = 'noopener';
          a.innerHTML = `
            <div class="card-top">
              <div class="card-icon">${icons[item.icon] || icons.flow}</div>
            </div>
            <h3>${item.name}</h3>
            <p>${item.desc}</p>
            <div class="card-foot">
              <span>Abrir herramienta</span>
              <span class="arrow">${icons.arrow}</span>
            </div>
          `;
          grid.appendChild(a);
        }
      });

      cont.appendChild(section);
    });

    document.getElementById('empty').classList.toggle('show', visibleCount === 0);
  }

  function getBadgeIcon(catId){
    const map = {
      'control-gmp': icons.flow,
      'auditorias': icons.alert,
      'documentos': icons.book,
      'kpis': icons.chart,
      'lcc': icons.home,
      'desarrollo': icons.code
    };
    return map[catId] || icons.flow;
  }

  document.getElementById('search').addEventListener('input', (e) => {
    currentSearch = e.target.value.trim();
    render();
  });

  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      render();
    });
  });

  document.getElementById('expand-all').addEventListener('click', () => {
    collapsedCategories.clear();
    expandedByDefault = true;
    document.querySelectorAll('.category').forEach(c => c.classList.remove('collapsed'));
  });

  document.getElementById('collapse-all').addEventListener('click', () => {
    expandedByDefault = false;
    document.querySelectorAll('.category').forEach(c => {
      c.classList.add('collapsed');
      if (c.dataset.catId) collapsedCategories.add(c.dataset.catId);
    });
  });

  render();
</script>

</body>
</html>
