<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Calidad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-900:#0a1628;
    --navy-800:#102542;
    --navy-700:#1a3358;
    --navy-600:#284b7a;
    --gold:#c9a96e;
    --gold-light:#e0c490;
    --cream:#f7f3ec;
    --paper:#fbf9f4;
    --ink:#1a2332;
    --ink-soft:#4a5568;
    --line:#d8d2c4;
    --danger:#a23b3b;
    --success:#3d6b4a;
    --shadow-sm:0 1px 3px rgba(10,22,40,.06), 0 1px 2px rgba(10,22,40,.04);
    --shadow-md:0 4px 12px rgba(10,22,40,.08), 0 2px 4px rgba(10,22,40,.04);
    --shadow-lg:0 12px 32px rgba(10,22,40,.12), 0 4px 8px rgba(10,22,40,.06);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'IBM Plex Sans',-apple-system,sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.5;
    min-height:100vh;
    background-image:
      radial-gradient(circle at 15% 10%, rgba(201,169,110,.06) 0%, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(40,75,122,.05) 0%, transparent 45%);
  }

  /* HEADER */
  header{
    background:var(--navy-900);
    color:var(--cream);
    padding:0;
    border-bottom:3px solid var(--gold);
    position:relative;
    overflow:hidden;
  }
  header::before{
    content:'';
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(135deg, transparent 0%, transparent 49.5%, rgba(201,169,110,.04) 49.5%, rgba(201,169,110,.04) 50.5%, transparent 50.5%),
      linear-gradient(45deg, transparent 0%, transparent 49.5%, rgba(201,169,110,.04) 49.5%, rgba(201,169,110,.04) 50.5%, transparent 50.5%);
    background-size: 40px 40px;
    pointer-events:none;
  }
  .header-inner{
    max-width:1280px;
    margin:0 auto;
    padding:2.5rem 2rem 2rem;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:2rem;
    flex-wrap:wrap;
    position:relative;
    z-index:1;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:1.25rem;
  }
  .brand-mark{
    width:56px;
    height:56px;
    border:2px solid var(--gold);
    display:grid;
    place-items:center;
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:1.75rem;
    color:var(--gold);
    transform:rotate(0deg);
    transition:transform .6s ease;
  }
  .brand-mark:hover{transform:rotate(360deg)}
  .brand-text .eyebrow{
    font-size:.7rem;
    letter-spacing:.25em;
    text-transform:uppercase;
    color:var(--gold-light);
    font-weight:500;
    margin-bottom:.25rem;
  }
  .brand-text h1{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:2rem;
    letter-spacing:-.02em;
    line-height:1;
  }
  .header-meta{
    text-align:right;
    font-size:.85rem;
    color:var(--gold-light);
  }
  .header-meta .date{
    font-family:'Fraunces',serif;
    font-style:italic;
    font-size:1rem;
    color:var(--cream);
  }
  .header-meta .label{
    font-size:.7rem;
    letter-spacing:.2em;
    text-transform:uppercase;
    margin-bottom:.25rem;
  }

  /* SEARCH BAR */
  .search-bar{
    background:var(--navy-800);
    padding:1.25rem 2rem;
    border-bottom:1px solid rgba(201,169,110,.2);
  }
  .search-inner{
    max-width:1280px;
    margin:0 auto;
    display:flex;
    gap:1rem;
    align-items:center;
    flex-wrap:wrap;
  }
  .search-wrap{
    flex:1;
    min-width:280px;
    position:relative;
  }
  .search-wrap svg{
    position:absolute;
    left:1rem;
    top:50%;
    transform:translateY(-50%);
    color:var(--gold);
    pointer-events:none;
  }
  #search{
    width:100%;
    padding:.85rem 1rem .85rem 2.75rem;
    background:rgba(247,243,236,.06);
    border:1px solid rgba(201,169,110,.3);
    color:var(--cream);
    font-family:inherit;
    font-size:.95rem;
    outline:none;
    transition:all .2s;
  }
  #search::placeholder{color:rgba(247,243,236,.5)}
  #search:focus{
    background:rgba(247,243,236,.1);
    border-color:var(--gold);
  }
  .filter-tabs{
    display:flex;
    gap:.25rem;
    flex-wrap:wrap;
  }
  .filter-tab{
    background:transparent;
    border:1px solid rgba(201,169,110,.3);
    color:var(--cream);
    padding:.6rem 1.1rem;
    font-family:inherit;
    font-size:.8rem;
    letter-spacing:.05em;
    cursor:pointer;
    transition:all .2s;
    text-transform:uppercase;
    font-weight:500;
  }
  .filter-tab:hover{border-color:var(--gold);color:var(--gold-light)}
  .filter-tab.active{
    background:var(--gold);
    border-color:var(--gold);
    color:var(--navy-900);
  }

  /* MAIN */
  main{
    max-width:1280px;
    margin:0 auto;
    padding:3rem 2rem 4rem;
  }

  /* STATS */
  .stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:1px;
    background:var(--line);
    border:1px solid var(--line);
    margin-bottom:3rem;
  }
  .stat{
    background:var(--paper);
    padding:1.5rem 1.75rem;
    position:relative;
  }
  .stat::before{
    content:'';
    position:absolute;
    top:0;left:0;
    width:24px;
    height:2px;
    background:var(--gold);
  }
  .stat-label{
    font-size:.7rem;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:.5rem;
    font-weight:500;
  }
  .stat-value{
    font-family:'Fraunces',serif;
    font-size:2.25rem;
    font-weight:500;
    color:var(--navy-900);
    line-height:1;
    letter-spacing:-.02em;
  }
  .stat-sub{
    font-size:.75rem;
    color:var(--ink-soft);
    margin-top:.4rem;
    font-style:italic;
    font-family:'Fraunces',serif;
  }

  /* CATEGORIES */
  .category{
    margin-bottom:3.5rem;
    animation:fadeUp .6s ease backwards;
  }
  .category:nth-child(1){animation-delay:.05s}
  .category:nth-child(2){animation-delay:.15s}
  .category:nth-child(3){animation-delay:.25s}
  .category:nth-child(4){animation-delay:.35s}
  .category:nth-child(5){animation-delay:.45s}

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
  }

  .category-header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:1.5rem;
    margin-bottom:1.5rem;
    padding-bottom:.75rem;
    border-bottom:1px solid var(--line);
  }
  .category-title{
    display:flex;
    align-items:baseline;
    gap:1rem;
  }
  .category-num{
    font-family:'Fraunces',serif;
    font-style:italic;
    font-size:.95rem;
    color:var(--gold);
    font-weight:400;
  }
  .category-title h2{
    font-family:'Fraunces',serif;
    font-size:1.6rem;
    font-weight:500;
    color:var(--navy-900);
    letter-spacing:-.01em;
  }
  .category-count{
    font-size:.75rem;
    letter-spacing:.15em;
    text-transform:uppercase;
    color:var(--ink-soft);
    font-weight:500;
  }

  /* GRID DE TARJETAS */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:1rem;
  }

  .card{
    background:#fff;
    border:1px solid var(--line);
    padding:1.5rem 1.5rem 1.25rem;
    cursor:pointer;
    transition:all .3s cubic-bezier(.2,.8,.2,1);
    position:relative;
    text-decoration:none;
    color:inherit;
    display:flex;
    flex-direction:column;
    min-height:160px;
    overflow:hidden;
  }
  .card::after{
    content:'';
    position:absolute;
    bottom:0;left:0;right:0;
    height:2px;
    background:var(--gold);
    transform:scaleX(0);
    transform-origin:left;
    transition:transform .4s ease;
  }
  .card:hover{
    border-color:var(--navy-700);
    transform:translateY(-3px);
    box-shadow:var(--shadow-lg);
  }
  .card:hover::after{transform:scaleX(1)}

  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:1rem;
  }
  .card-icon{
    width:42px;
    height:42px;
    border:1px solid var(--line);
    display:grid;
    place-items:center;
    color:var(--navy-700);
    background:var(--paper);
    transition:all .3s;
  }
  .card:hover .card-icon{
    background:var(--navy-900);
    color:var(--gold);
    border-color:var(--navy-900);
  }
  .card-fav{
    background:none;
    border:none;
    cursor:pointer;
    padding:.25rem;
    color:var(--line);
    transition:all .2s;
    line-height:0;
  }
  .card-fav:hover{color:var(--gold);transform:scale(1.15)}
  .card-fav.active{color:var(--gold)}

  .card h3{
    font-family:'Fraunces',serif;
    font-size:1.15rem;
    font-weight:500;
    color:var(--navy-900);
    margin-bottom:.4rem;
    line-height:1.25;
    letter-spacing:-.01em;
  }
  .card p{
    font-size:.82rem;
    color:var(--ink-soft);
    line-height:1.45;
    flex:1;
  }
  .card-foot{
    margin-top:1rem;
    padding-top:.75rem;
    border-top:1px dashed var(--line);
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:.7rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--ink-soft);
    font-weight:500;
  }
  .card-foot .arrow{
    transition:transform .3s;
    color:var(--gold);
  }
  .card:hover .card-foot .arrow{transform:translateX(4px)}

  /* PLACEHOLDER */
  .card-placeholder{
    background:repeating-linear-gradient(45deg,var(--paper),var(--paper) 8px,#fff 8px,#fff 16px);
    border:1px dashed var(--line);
    cursor:default;
    opacity:.85;
  }
  .card-placeholder:hover{
    transform:none;
    border-color:var(--line);
    box-shadow:none;
  }
  .card-placeholder:hover::after{transform:scaleX(0)}
  .card-placeholder:hover .card-icon{
    background:var(--paper);
    color:var(--navy-700);
    border-color:var(--line);
  }
  .card-placeholder h3{color:var(--ink-soft);font-style:italic}
  .badge-soon{
    display:inline-block;
    font-size:.65rem;
    letter-spacing:.15em;
    text-transform:uppercase;
    background:var(--gold);
    color:var(--navy-900);
    padding:.2rem .5rem;
    font-weight:600;
    margin-bottom:.75rem;
  }

  /* EMPTY */
  .empty{
    text-align:center;
    padding:4rem 2rem;
    color:var(--ink-soft);
    font-family:'Fraunces',serif;
    font-style:italic;
    font-size:1.1rem;
    display:none;
  }
  .empty.show{display:block}

  /* FOOTER */
  footer{
    border-top:1px solid var(--line);
    padding:2rem;
    text-align:center;
    color:var(--ink-soft);
    font-size:.75rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    background:#fff;
  }
  footer span{color:var(--gold)}

  /* MOBILE */
  @media (max-width:640px){
    .header-inner{padding:1.75rem 1.25rem 1.5rem}
    .brand-text h1{font-size:1.5rem}
    .search-bar{padding:1rem 1.25rem}
    main{padding:2rem 1.25rem 3rem}
    .category-title h2{font-size:1.3rem}
    .grid{grid-template-columns:1fr}
    .stat-value{font-size:1.75rem}
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-mark">Q</div>
      <div class="brand-text">
        <div class="eyebrow">Sistema de Gestión</div>
        <h1>Dashboard Calidad</h1>
      </div>
    </div>
    <div class="header-meta">
      <div class="label">Última actualización</div>
      <div class="date" id="today">—</div>
    </div>
  </div>
</header>

<div class="search-bar">
  <div class="search-inner">
    <div class="search-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Buscar herramientas, formularios, procesos…" autocomplete="off">
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">Todos</button>
      <button class="filter-tab" data-filter="favorites">★ Favoritos</button>
    </div>
  </div>
</div>

<main>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Herramientas</div>
      <div class="stat-value" id="stat-total">0</div>
      <div class="stat-sub">activas en el sistema</div>
    </div>
    <div class="stat">
      <div class="stat-label">Categorías</div>
      <div class="stat-value">5</div>
      <div class="stat-sub">áreas de gestión</div>
    </div>
    <div class="stat">
      <div class="stat-label">Favoritos</div>
      <div class="stat-value" id="stat-fav">0</div>
      <div class="stat-sub">marcados por usted</div>
    </div>
    <div class="stat">
      <div class="stat-label">En desarrollo</div>
      <div class="stat-value" id="stat-soon">0</div>
      <div class="stat-sub">próximamente</div>
    </div>
  </div>

  <div id="categories"></div>

  <div class="empty" id="empty">No se encontraron resultados para su búsqueda.</div>

</main>

<footer>
  Dashboard Calidad · <span>GMP</span> · Control y Gestión Integral
</footer>

<script>
  // === DATOS ===
  const data = [
    {
      id: 'control-gmp',
      title: 'Control GMP',
      num: 'I',
      items: [
        {
          id: 'cambios',
          name: 'Control de Cambios',
          desc: 'Gestión, evaluación y aprobación de cambios en procesos y productos.',
          url: 'https://vessena-repositorio.github.io/control-gmp-app/control_cambios.html',
          icon: 'change'
        },
        {
          id: 'nc',
          name: 'No Conformidades',
          desc: 'Registro, análisis y seguimiento de no conformidades detectadas.',
          url: 'https://vessena-repositorio.github.io/control-gmp-app/no_conformidades.html',
          icon: 'alert'
        }
      ]
    },
    {
      id: 'auditorias',
      title: 'Auditorías',
      num: 'II',
      items: [
        { placeholder: true, name: 'Sistema de Auditorías', desc: 'Próximamente disponible.' }
      ]
    },
    {
      id: 'documentos',
      title: 'Documentos',
      num: 'III',
      items: [
        {
          id: 'guia-entrenamiento',
          name: 'Guía de Entrenamiento GMP',
          desc: 'Material de capacitación y entrenamiento en buenas prácticas de manufactura.',
          url: 'https://vessena-repositorio.github.io/control-gmp-app/guia-entrenamiento-gmp.html',
          icon: 'book'
        }
      ]
    },
    {
      id: 'kpis',
      title: 'KPIs',
      num: 'IV',
      items: [
        {
          id: 'peso-lineas',
          name: 'Control de Peso Líneas',
          desc: 'Reporte gerencial con KPIs, estadísticas y análisis de pesos en líneas de producción.',
          url: 'https://vessena-repositorio.github.io/control-gmp-app/informe-gerencial.html',
          icon: 'chart'
        }
      ]
    },
    {
      id: 'lcc',
      title: 'LCC',
      num: 'V',
      items: [
        {
          id: 'home',
          name: 'Inicio Control GMP',
          desc: 'Portal principal del sistema de control de buenas prácticas de manufactura.',
          url: 'https://vessena-repositorio.github.io/control-gmp-app/',
          icon: 'home'
        },
        {
          id: 'workflow',
          name: 'Control Calidad Workflow',
          desc: 'Flujo de trabajo para el control y seguimiento de procesos de calidad.',
          url: 'https://vessena-repositorio.github.io/control-gmp-app/control-calidad-workflow.html',
          icon: 'flow'
        },
        {
          id: 'envases',
          name: 'Control Calidad Envases',
          desc: 'Verificación, inspección y registro de la calidad de envases.',
          url: 'https://vessena-repositorio.github.io/control-gmp-app/control-calidad-envases.html',
          icon: 'box'
        }
      ]
    }
  ];

  // === ICONOS SVG ===
  const icons = {
    home: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
    flow: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="6" height="6"/><rect x="15" y="15" width="6" height="6"/><path d="M9 6h6a3 3 0 0 1 3 3v6"/></svg>',
    box: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m21 8-9 4-9-4 9-4 9 4z"/><path d="M3 8v8l9 4 9-4V8"/><path d="M12 12v8"/></svg>',
    change: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>',
    alert: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
    chart: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="3" y1="20" x2="21" y2="20"/></svg>',
    book: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
    soon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>',
    star: '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
    starOutline: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
    arrow: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>'
  };

  // === FAVORITOS (memoria de sesión) ===
  let favorites = new Set();
  let currentFilter = 'all';
  let currentSearch = '';

  // === FECHA ===
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const hoy = new Date();
  document.getElementById('today').textContent = `${hoy.getDate()} de ${meses[hoy.getMonth()]} de ${hoy.getFullYear()}`;

  // === RENDER ===
  function render(){
    const cont = document.getElementById('categories');
    cont.innerHTML = '';
    let visibleCount = 0;
    let totalReal = 0;
    let totalSoon = 0;

    data.forEach(cat => {
      const filteredItems = cat.items.filter(item => {
        // contar
        if (!item.placeholder) totalReal++;
        else totalSoon++;

        // filtro favoritos
        if (currentFilter === 'favorites' && (!item.id || !favorites.has(item.id))) return false;

        // filtro búsqueda
        if (currentSearch){
          const q = currentSearch.toLowerCase();
          return item.name.toLowerCase().includes(q) || item.desc.toLowerCase().includes(q) || cat.title.toLowerCase().includes(q);
        }
        return true;
      });

      if (filteredItems.length === 0) return;
      visibleCount += filteredItems.length;

      const section = document.createElement('section');
      section.className = 'category';
      section.innerHTML = `
        <div class="category-header">
          <div class="category-title">
            <span class="category-num">${cat.num}</span>
            <h2>${cat.title}</h2>
          </div>
          <span class="category-count">${cat.items.filter(i=>!i.placeholder).length} ${cat.items.filter(i=>!i.placeholder).length === 1 ? 'recurso' : 'recursos'}</span>
        </div>
        <div class="grid"></div>
      `;
      const grid = section.querySelector('.grid');

      filteredItems.forEach(item => {
        if (item.placeholder){
          const ph = document.createElement('div');
          ph.className = 'card card-placeholder';
          ph.innerHTML = `
            <div class="card-top">
              <div class="card-icon">${icons.soon}</div>
            </div>
            <span class="badge-soon">En desarrollo</span>
            <h3>${item.name}</h3>
            <p>${item.desc}</p>
          `;
          grid.appendChild(ph);
        } else {
          const a = document.createElement('a');
          a.className = 'card';
          a.href = item.url;
          a.target = '_blank';
          a.rel = 'noopener';
          const isFav = favorites.has(item.id);
          a.innerHTML = `
            <div class="card-top">
              <div class="card-icon">${icons[item.icon] || icons.flow}</div>
              <button class="card-fav ${isFav ? 'active' : ''}" data-id="${item.id}" title="${isFav ? 'Quitar de favoritos' : 'Marcar como favorito'}">
                ${isFav ? icons.star : icons.starOutline}
              </button>
            </div>
            <h3>${item.name}</h3>
            <p>${item.desc}</p>
            <div class="card-foot">
              <span>Abrir</span>
              <span class="arrow">${icons.arrow}</span>
            </div>
          `;
          // click en estrella sin abrir link
          a.querySelector('.card-fav').addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            toggleFav(item.id);
          });
          grid.appendChild(a);
        }
      });

      cont.appendChild(section);
    });

    // empty state
    document.getElementById('empty').classList.toggle('show', visibleCount === 0);

    // stats
    document.getElementById('stat-total').textContent = totalReal;
    document.getElementById('stat-fav').textContent = favorites.size;
    document.getElementById('stat-soon').textContent = totalSoon;
  }

  function toggleFav(id){
    if (favorites.has(id)) favorites.delete(id);
    else favorites.add(id);
    render();
  }

  // === EVENTOS ===
  document.getElementById('search').addEventListener('input', (e) => {
    currentSearch = e.target.value.trim();
    render();
  });

  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      render();
    });
  });

  // === INIT ===
  render();
</script>

</body>
</html>
