        // =====================================================

        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby0Idz2-18NsukOhRqqrQrgHCpO7f4gX67kb-5gH0xA1DLxw7t39Yr37_PakYth5srj/exec';

        // Helper para llamadas a la API de Google Sheets
        async function apiCall(action, data = null, params = {}) {
            const url = new URL(GOOGLE_SCRIPT_URL);
            url.searchParams.set('action', action);
            Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));

            const options = data
                ? { method: 'POST', body: JSON.stringify(data), headers: { 'Content-Type': 'text/plain' } }
                : { method: 'GET' };
            
            // Google redirige, hay que seguir la redirección
            const response = await fetch(url.toString(), { ...options, redirect: 'follow' });
            return response.json();
        }

        // Determina el turno actual según la hora del dispositivo
        // 06-13:59 = mañana, 14-21:59 = tarde, 22-05:59 = noche
        function getTurnoActual() {
            const h = new Date().getHours();
            if (h >= 6 && h < 14) return 'mañana';
            if (h >= 14 && h < 22) return 'tarde';
            return 'noche';
        }

            // Estados Órdenes Soplado

            const [nuevaOrdenData, setNuevaOrdenData] = useState({
                numeroOrden: '', envase: '', fecha: new Date().toISOString().split('T')[0],
                operador: '', turno: getTurnoActual()

            const [ordenSeleccionada, setOrdenSeleccionada] = useState(null);
            const [mostrarSeleccionOrden, setMostrarSeleccionOrden] = useState(false);
            
            // Estados Controles LCC
            const [mostrarNuevoLCC, setMostrarNuevoLCC] = useState(false);
            const [tipoControlLCC, setTipoControlLCC] = useState('');
            const [nuevoControlLCC, setNuevoControlLCC] = useState({
                envase: '', fecha: new Date().toISOString().split('T')[0],
                operador: '', turno: getTurnoActual()
            });
            
            // Estados comunes
            const [hora, setHora] = useState('');
            const [mediciones, setMediciones] = useState({});
            const [observaciones, setObservaciones] = useState('');
            const [controlDetalle, setControlDetalle] = useState(null);
            const [filtroEnvase, setFiltroEnvase] = useState('');
            const [filtroEstado, setFiltroEstado] = useState('todas');
            const [busqueda, setBusqueda] = useState('');
            const [mostrarAlertasOOS, setMostrarAlertasOOS] = useState(false);

            // Cargar datos desde Google Sheets al iniciar
            const cargarDatos = async () => {
                if (!configurado) { setCargando(false); return; }
                try {
                    setCargando(true);
                    const result = await apiCall('getAll');
                    if (result.error) throw new Error(result.error);
                    setOrdenesSoplado(result.ordenes || []);
                    setControlesLCC(result.lcc || []);
                } catch (err) {
                    console.error('Error cargando datos:', err);
                    setMensaje({ tipo: 'warning', texto: '⚠️ Error al conectar con Google Sheets. Verificá la URL del script.' });
                    // Fallback a localStorage
                    const storedOrdenes = localStorage.getItem('ordenes_soplado');
                    const storedLCC = localStorage.getItem('controles_lcc');
                    if (storedOrdenes) setOrdenesSoplado(JSON.parse(storedOrdenes));
                    if (storedLCC) setControlesLCC(JSON.parse(storedLCC));
                } finally {
                    setCargando(false);
                }
            };

            useEffect(() => { cargarDatos(); }, []);

            // Auto-sincronización cada 5 minutos
            useEffect(() => {
                if (!configurado) return;
                const intervalo = setInterval(() => {
                    cargarDatos();
                }, 5 * 60 * 1000);
                return () => clearInterval(intervalo);
            }, [configurado]);

            // Guardar órdenes en Google Sheets (y localStorage como backup)
            const guardarOrdenes = (nuevasOrdenes) => {
                localStorage.setItem('ordenes_soplado', JSON.stringify(nuevasOrdenes));
                setOrdenesSoplado(nuevasOrdenes);
            };

            // Guardar controles LCC en Google Sheets (y localStorage como backup)
            const guardarControlesLCC = (nuevosControles) => {
                localStorage.setItem('controles_lcc', JSON.stringify(nuevosControles));
                setControlesLCC(nuevosControles);
            };

            const crearNuevaOrden = async () => {
                if (!nuevaOrdenData.numeroOrden || !nuevaOrdenData.envase || !nuevaOrdenData.operador) {
                    setMensaje({ tipo: 'warning', texto: 'Complete todos los campos obligatorios' });
                    return;
                }
                const id = Date.now();
                // Si hay campaña seleccionada, usar su campaign_id; sino, esta orden inicia campaña nueva (id propio)
                const campaign_id = campanaSeleccionada ? campanaSeleccionada.campaign_id : id;
                const nuevaOrden = {
                    id, ...nuevaOrdenData, estado: 'activa', controles: [],
                    createdAt: new Date().toISOString(),
                    campaign_id
                };
                setGuardando(true);
                guardarOrdenes([nuevaOrden, ...ordenesSoplado]);
                
                // Enviar a Google Sheets
                if (configurado) {
                    try {
                        await apiCall('saveOrden', nuevaOrden);
                    } catch (err) {
                        console.error('Error guardando en Sheets:', err);
                        setMensaje({ tipo: 'warning', texto: '⚠️ Guardado local OK, pero falló la sincronización con Google Sheets' });
                    }
                }
                setGuardando(false);
                const msgCampana = campanaSeleccionada 
                    ? ` (continuación de campaña ${campanaSeleccionada.envase})`
                    : ' (nueva campaña iniciada)';
                setMensaje({ tipo: 'success', texto: `✓ Orden ${nuevaOrdenData.numeroOrden} creada${msgCampana}` });
                setMostrarNuevaOrden(false);
                setCampanaSeleccionada(null);
                setNuevaOrdenData({
                    numeroOrden: '', envase: '', fecha: new Date().toISOString().split('T')[0],
                    operador: '', turno: getTurnoActual()
                });
            };

            // Obtiene campañas activas (al menos 1 orden con estado='activa')
            // Garantiza 1 campaña activa por envase como máximo (la más reciente)
            const obtenerCampanasActivas = () => {
                const grupos = {};
                ordenesSoplado.forEach(o => {
                    const cid = o.campaign_id || o.id;
                    if (!grupos[cid]) {
                        grupos[cid] = {
                            campaign_id: cid,
                            envase: o.envase,
                            ordenes: [],
                            primeraFecha: o.fecha,
                            tieneActiva: false
                        };
                    }
                    grupos[cid].ordenes.push(o);
                    if (o.estado === 'activa') grupos[cid].tieneActiva = true;
                    if (new Date(o.fecha) < new Date(grupos[cid].primeraFecha)) {
                        grupos[cid].primeraFecha = o.fecha;
                    }
                });
                const activas = Object.values(grupos).filter(g => g.tieneActiva);
                
                // Si hay duplicados por envase, quedarse con la más reciente
                const porEnvase = {};
                activas.forEach(c => {
                    const fecha = new Date(c.primeraFecha).getTime();
                    if (!porEnvase[c.envase] || fecha > new Date(porEnvase[c.envase].primeraFecha).getTime()) {
                        porEnvase[c.envase] = c;
                    }
                });
                return Object.values(porEnvase);
            };

            const finalizarCampana = async (campaign_id) => {
                if (!confirm('¿Finalizar la campaña? Todas las órdenes activas pasarán a estado "finalizada".')) return;
                
                // Actualizar localmente
                const ordenesActualizadas = ordenesSoplado.map(o => {
                    const cid = o.campaign_id || o.id;
                    if (String(cid) === String(campaign_id) && o.estado === 'activa') {
                        return { ...o, estado: 'finalizada' };
                    }
                    return o;
                });
                guardarOrdenes(ordenesActualizadas);
                
                // Sincronizar con Google Sheets
                if (configurado) {
                    try {
                        await apiCall('finalizarCampana', null, { campaign_id });
                    } catch (err) {
                        console.error('Error finalizando campaña:', err);
                    }
                }
                setMensaje({ tipo: 'success', texto: '✓ Campaña finalizada' });
            };

            const registrarControlSoplado = async () => {
                if (!ordenSeleccionada) {
                    setMensaje({ tipo: 'warning', texto: 'Seleccione una orden' });
                    return;
                }
                
                // Validar peso si el envase lo requiere
                const specEnvase = ESPECIFICACIONES[ordenSeleccionada.envase];
                if (specEnvase?.parametros?.peso) {
                    const cavidades = specEnvase.cavidades || 1;
                    const prefijo = tipoControlSoplado === 'arranque' ? 'arr_peso_cav' : 'proc_peso_cav';
                    const pesosCargados = [];
                    for (let i = 1; i <= cavidades; i++) {
                        const v = mediciones[`${prefijo}${i}`];
                        if (v !== undefined && v !== '' && v !== null) pesosCargados.push(i);
                    }
                    if (pesosCargados.length === 0) {
                        setMensaje({ 
                            tipo: 'warning', 
                            texto: `⚖️ El peso es obligatorio para ${specEnvase.nombre}. Cargá al menos una cavidad.` 
                        });
                        return;
                    }
                }
                const nuevoControl = {
                    id: Date.now(), tipo: tipoControlSoplado,
                    fecha: new Date().toISOString().split('T')[0],
                    hora: new Date().toLocaleTimeString('es-UY', { hour: '2-digit', minute: '2-digit' }),
                    mediciones: { ...mediciones }, observaciones, timestamp: new Date().toISOString()
                };
                const ordenesActualizadas = ordenesSoplado.map(orden => {
                    if (orden.id === ordenSeleccionada.id) {
                        return { ...orden, controles: [...orden.controles, nuevoControl] };
                    }
                    return orden;
                });
                setGuardando(true);
                guardarOrdenes(ordenesActualizadas);
                
                // Sincronizar con Google Sheets
                if (configurado) {
                    try {
                        await apiCall('saveControlSoplado', {
                            id: nuevoControl.id,
                            ordenId: ordenSeleccionada.id,
                            numeroOrden: ordenSeleccionada.numeroOrden,
                            envase: ordenSeleccionada.envase,
                            tipoControl: nuevoControl.tipo,
                            fecha: nuevoControl.fecha,
                            hora: nuevoControl.hora,
                            operador: ordenSeleccionada.operador,
                            turno: ordenSeleccionada.turno || '',
                            observaciones: nuevoControl.observaciones,
                            mediciones: nuevoControl.mediciones,
                            timestamp: nuevoControl.timestamp
                        });
                    } catch (err) {
                        console.error('Error sincronizando:', err);
                    }
                }
                setGuardando(false);
                setMensaje({ tipo: 'success', texto: `✓ Control de ${tipoControlSoplado} registrado` });
                resetFormularios();
            };

            const registrarControlLCC = async () => {
                if (!nuevoControlLCC.envase || !nuevoControlLCC.operador || !tipoControlLCC) {
                    setMensaje({ tipo: 'warning', texto: 'Complete todos los campos obligatorios' });
                    return;
                }
                const nuevoControl = {
                    id: Date.now(), tipo: tipoControlLCC, ...nuevoControlLCC,
                    hora: new Date().toLocaleTimeString('es-UY', { hour: '2-digit', minute: '2-digit' }),
                    mediciones: { ...mediciones }, observaciones, timestamp: new Date().toISOString()
                };
                setGuardando(true);
                guardarControlesLCC([nuevoControl, ...controlesLCC]);
                
                // Enviar a Google Sheets
                if (configurado) {
                    try {
                        await apiCall('saveLCC', nuevoControl);
                    } catch (err) {
                        console.error('Error guardando LCC en Sheets:', err);
                    }
                }
                setGuardando(false);
                setMensaje({ tipo: 'success', texto: `✓ Control ${tipoControlLCC} registrado` });
                resetFormularios();
                setMostrarNuevoLCC(false);
            };

            const resetFormularios = () => {
                setMediciones({});
                setObservaciones('');
                setHora('');
                setTipoControlSoplado('');
                setTipoControlLCC('');
                setOrdenSeleccionada(null);
                setMostrarSeleccionOrden(false);
                setCampanaFiltroProceso(null);
                setNuevoControlLCC({
                    envase: '', fecha: new Date().toISOString().split('T')[0],
                    operador: '', turno: getTurnoActual()
                });
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const esFabuloso = (envase) => envase === 'FAB-1L' || envase === 'FAB-2L';

            const finalizarOrden = async (ordenId) => {
                const ordenesActualizadas = ordenesSoplado.map(orden => {
                    if (orden.id === ordenId) return { ...orden, estado: 'finalizada' };
                    return orden;
                });
                guardarOrdenes(ordenesActualizadas);
                
                if (configurado) {
                    try {
                        const ordenFinalizada = ordenesActualizadas.find(o => o.id === ordenId);
                        await apiCall('updateOrden', ordenFinalizada);
                    } catch (err) { console.error('Error finalizando:', err); }
                }
                setMensaje({ tipo: 'success', texto: 'Orden finalizada' });
            };

            const eliminarOrden = async (ordenId) => {
                if (confirm('¿Eliminar esta orden?')) {
                    guardarOrdenes(ordenesSoplado.filter(orden => orden.id !== ordenId));
                    
                    if (configurado) {
                        try { await apiCall('deleteOrden', null, { id: ordenId }); }
                        catch (err) { console.error('Error eliminando:', err); }
                    }
                    setMensaje({ tipo: 'success', texto: 'Orden eliminada' });
                }
            };

            const eliminarControlLCC = async (controlId) => {
                if (confirm('¿Eliminar este control LCC?')) {
                    guardarControlesLCC(controlesLCC.filter(c => c.id !== controlId));
                    
                    if (configurado) {
                        try { await apiCall('deleteLCC', null, { id: controlId }); }
                        catch (err) { console.error('Error eliminando LCC:', err); }
                    }
                    setMensaje({ tipo: 'success', texto: 'Control eliminado' });
                }
            };

            const exportarOrdenExcel = (orden) => {
                const spec = ESPECIFICACIONES[orden.envase];
                let csv = `Orden,${orden.numeroOrden}\nEnvase,${spec.nombre}\nOperador,${orden.operador}\nFecha,${orden.fecha}\n\n`;
                csv += 'CONTROLES\n';
                orden.controles.forEach((c, i) => {
                    csv += `${i+1},${c.tipo},${c.fecha},${c.hora}\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `${orden.numeroOrden}_${orden.fecha}.csv`;
                link.click();
            };

            const calcularDiasActiva = (fechaInicio) => {
                const inicio = new Date(fechaInicio);
                const hoy = new Date();
                return Math.floor((hoy - inicio) / (1000 * 60 * 60 * 24));
            };

            // Normaliza cualquier fecha a formato YYYY-MM-DD legible
            const formatearFecha = (d) => {
                if (!d) return '—';
                try {
                    if (typeof d === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
                    const date = new Date(d);
                    if (isNaN(date.getTime())) return '—';
                    const yyyy = date.getFullYear();
                    const mm = String(date.getMonth() + 1).padStart(2, '0');
                    const dd = String(date.getDate()).padStart(2, '0');
                    return `${yyyy}-${mm}-${dd}`;
                } catch { return '—'; }
            };

            return (
                <div className="container">
                    <div className="header">
                        <div>
                            <div className="logo">VESSENA</div>
                            <h1>Control de Calidad - Envases</h1>
                        </div>
                        <div style={{textAlign: 'right', color: '#718096', display: 'flex', alignItems: 'center', gap: '15px'}}>
                            <div style={{fontSize: '14px'}}>SOP-PR-138</div>
                            {configurado && (
                                <button className="btn btn-secondary" onClick={cargarDatos}
                                    style={{fontSize: '13px', padding: '6px 14px'}}
                                    disabled={cargando}>
                                    {cargando ? '⏳ Cargando...' : '🔄 Sincronizar'}
                                </button>
                            )}
                            <div style={{fontSize: '12px'}}>
                                {configurado 
                                    ? <span style={{color: '#38a169'}}>● Google Sheets conectado</span>
                                    : <span style={{color: '#e53e3e'}}>● Solo local</span>
                                }
                            </div>
                        </div>
                    </div>

                    {!configurado && (
                        <div className="alert alert-warning" style={{marginBottom: '20px', borderRadius: '12px'}}>
                            <strong>⚠️ Google Sheets no configurado.</strong> Los datos se guardan solo en este navegador (localStorage). 
                            Para compartir datos entre usuarios, seguí las instrucciones del archivo <code>google-apps-script.js</code> 
                            y pegá la URL en la constante <code>GOOGLE_SCRIPT_URL</code> al inicio del código.
                        </div>
                    )}

                    {guardando && (
                        <div className="alert alert-info" style={{marginBottom: '20px', borderRadius: '12px'}}>
                            ⏳ Guardando en Google Sheets...
                        </div>
                    )}

                    {cargando ? (
                        <div style={{background: 'white', borderRadius: '12px', padding: '60px 20px', textAlign: 'center'}}>
                            <div style={{fontSize: '48px', marginBottom: '15px'}}>⏳</div>
                            <p style={{color: '#718096', fontSize: '16px'}}>Cargando datos desde Google Sheets...</p>
                        </div>
                    ) : (
                    <div className="main-content">
                        <div className="tabs">
                            <button className={`tab ${activeTab === 'soplado' ? 'active' : ''}`}
                                onClick={() => setActiveTab('soplado')}>
                                🏭 Órdenes de Soplado
                            </button>
                            <button className={`tab ${activeTab === 'lcc' ? 'active' : ''}`}
                                onClick={() => setActiveTab('lcc')}>
                                🔬 Controles LCC
                            </button>
                            <button className={`tab ${activeTab === 'historico' ? 'active' : ''}`}
                                onClick={() => setActiveTab('historico')}>
                                📊 Histórico
                            </button>
                        </div>

                        <div className="content">
                            {mensaje && <div className={`alert alert-${mensaje.tipo}`}>{mensaje.texto}</div>}

                            {/* TAB: ÓRDENES DE SOPLADO */}
                            {activeTab === 'soplado' && (
                                <>
                                    {!mostrarNuevaOrden && !mostrarSeleccionOrden && (
                                        <div className="form-section">
                                            <h3 style={{marginBottom: '15px'}}>Órdenes de Soplado (REG-B / REG-G)</h3>
                                            <p style={{color: '#718096', marginBottom: '20px'}}>
                                                Registre controles de arranque y proceso cada 2 horas durante la producción
                                            </p>
                                            <div className="button-group" style={{borderTop: 'none', paddingTop: 0, marginTop: 0}}>
                                                <button className="btn btn-primary" onClick={() => setMostrarSelCampana(true)}>
                                                    ➕ Crear Nueva Orden de Soplado
                                                </button>
                                                <button className="btn btn-success" onClick={() => {
                                                    const activas = ordenesSoplado.filter(o => o.estado === 'activa');
                                                    if (activas.length === 0) {
                                                        setMensaje({ tipo: 'warning', texto: 'No hay órdenes activas' });
                                                    } else {
                                                        setMostrarSeleccionOrden(true);
                                                    }
                                                }}>
                                                    📋 Registrar Control en Orden Existente
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    {/* MODAL: SELECCIÓN DE CAMPAÑA */}
                                    {mostrarSelCampana && (
                                        <div className="form-section">
                                            <h2 className="section-title">Seleccionar Envase / Campaña</h2>
                                            <p style={{color: '#718096', marginBottom: '20px'}}>
                                                Una campaña agrupa todas las órdenes de un mismo envase.
                                                Solo puede haber <strong>una campaña activa por envase</strong> a la vez.
                                            </p>

                                            {(() => {
                                                const campanasActivas = obtenerCampanasActivas();
                                                // Mapear envase → campaña activa
                                                const campanaPorEnvase = {};
                                                campanasActivas.forEach(c => { campanaPorEnvase[c.envase] = c; });

                                                return (
                                                    <>
                                                        <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: '12px', marginBottom: '20px'}}>
                                                            {Object.entries(ESPECIFICACIONES).map(([envaseKey, val]) => {
                                                                const campActiva = campanaPorEnvase[envaseKey];
                                                                const tieneActiva = !!campActiva;
                                                                
                                                                return (
                                                                    <div key={envaseKey}
                                                                        style={{
                                                                            border: tieneActiva ? '2px solid #48bb78' : '2px solid #e2e8f0',
                                                                            background: tieneActiva ? '#f0fff4' : '#fff',
                                                                            borderRadius: '12px', padding: '16px',
                                                                            cursor: 'pointer', transition: 'all 0.2s'
                                                                        }}
                                                                        onClick={() => {
                                                                            if (tieneActiva) {
                                                                                // Continuar campaña existente
                                                                                setCampanaSeleccionada(campActiva);
                                                                                setNuevaOrdenData({
                                                                                    ...nuevaOrdenData,
                                                                                    envase: envaseKey,
                                                                                    turno: getTurnoActual(),
                                                                                    fecha: new Date().toISOString().split('T')[0]
                                                                                });
                                                                            } else {
                                                                                // Iniciar nueva campaña para este envase
                                                                                setCampanaSeleccionada(null);
                                                                                setNuevaOrdenData({
                                                                                    ...nuevaOrdenData,
                                                                                    envase: envaseKey,
                                                                                    turno: getTurnoActual(),
                                                                                    fecha: new Date().toISOString().split('T')[0]
                                                                                });
                                                                            }
                                                                            setMostrarSelCampana(false);
                                                                            setMostrarNuevaOrden(true);
                                                                        }}>
                                                                        <div style={{fontWeight: '700', fontSize: '15px', color: '#2d3748', marginBottom: '6px'}}>
                                                                            📦 {val.nombre}
                                                                        </div>
                                                                        <div style={{fontSize: '12px', color: '#718096', marginBottom: '10px'}}>
                                                                            {envaseKey}
                                                                        </div>
                                                                        {tieneActiva ? (
                                                                            <>
                                                                                <div style={{
                                                                                    background: '#48bb78', color: 'white',
                                                                                    padding: '4px 10px', borderRadius: '12px',
                                                                                    fontSize: '11px', fontWeight: '700',
                                                                                    display: 'inline-block', marginBottom: '8px'
                                                                                }}>● CAMPAÑA ACTIVA</div>
                                                                                <div style={{fontSize: '12px', color: '#4a5568', lineHeight: '1.6'}}>
                                                                                    Iniciada: {formatearFecha(campActiva.primeraFecha)}<br/>
                                                                                    {campActiva.ordenes.length} {campActiva.ordenes.length === 1 ? 'orden' : 'órdenes'} ·{' '}
                                                                                    {campActiva.ordenes.reduce((a, o) => a + (o.controles?.length || 0), 0)} controles
                                                                                </div>
                                                                                <div style={{marginTop: '10px', color: '#2f855a', fontWeight: '600', fontSize: '13px'}}>
                                                                                    ▶ Continuar campaña →
                                                                                </div>
                                                                            </>
                                                                        ) : (
                                                                            <>
                                                                                <div style={{
                                                                                    background: '#cbd5e0', color: '#2d3748',
                                                                                    padding: '4px 10px', borderRadius: '12px',
                                                                                    fontSize: '11px', fontWeight: '700',
                                                                                    display: 'inline-block', marginBottom: '8px'
                                                                                }}>SIN CAMPAÑA ACTIVA</div>
                                                                                <div style={{marginTop: '10px', color: '#667eea', fontWeight: '600', fontSize: '13px'}}>
                                                                                    🆕 Iniciar nueva campaña →
                                                                                </div>
                                                                            </>
                                                                        )}
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>

                                                        <div style={{borderTop: '1px solid #e2e8f0', paddingTop: '15px'}}>
                                                            <button className="btn btn-secondary"
                                                                onClick={() => setMostrarSelCampana(false)}>
                                                                Cancelar
                                                            </button>
                                                        </div>
                                                    </>
                                                );
                                            })()}
                                        </div>
                                    )}

                                    {mostrarNuevaOrden && (
                                        <div className="form-section">
                                            <h2 className="section-title">
                                                {campanaSeleccionada 
                                                    ? `Nueva Orden en Campaña ${ESPECIFICACIONES[campanaSeleccionada.envase]?.nombre || campanaSeleccionada.envase}`
                                                    : 'Nueva Campaña - Primera Orden'}
                                            </h2>
                                            {campanaSeleccionada && (
                                                <div className="alert alert-info" style={{marginBottom: '15px'}}>
                                                    ▶ Continuando campaña iniciada el {formatearFecha(campanaSeleccionada.primeraFecha)} ·{' '}
                                                    {campanaSeleccionada.ordenes.length} órdenes anteriores
                                                </div>
                                            )}
                                            <div className="form-grid">
                                                <div className="form-group">
                                                    <label>Número de Orden *</label>
                                                    <input type="text" value={nuevaOrdenData.numeroOrden}
                                                        onChange={(e) => setNuevaOrdenData({...nuevaOrdenData, numeroOrden: e.target.value})}
                                                        placeholder="FAB-2L-2024-045" />
                                                </div>
                                                <div className="form-group">
                                                    <label>Envase *{campanaSeleccionada && ' (fijo por campaña)'}</label>
                                                    <select value={nuevaOrdenData.envase}
                                                        onChange={(e) => setNuevaOrdenData({...nuevaOrdenData, envase: e.target.value})}
                                                        disabled={!!campanaSeleccionada}>
                                                        <option value="">Seleccione...</option>
                                                        {Object.entries(ESPECIFICACIONES).map(([key, val]) => (
                                                            <option key={key} value={key}>{val.nombre}</option>
                                                        ))}
                                                    </select>
                                                </div>
                                                <div className="form-group">
                                                    <label>Fecha Inicio</label>
                                                    <input type="date" value={nuevaOrdenData.fecha}
                                                        onChange={(e) => setNuevaOrdenData({...nuevaOrdenData, fecha: e.target.value})} />
                                                </div>
                                                <div className="form-group">
                                                    <label>Operador *</label>
                                                    <input type="text" value={nuevaOrdenData.operador}
                                                        onChange={(e) => setNuevaOrdenData({...nuevaOrdenData, operador: e.target.value})} />
                                                </div>
                                                <div className="form-group">

                                                                                        )}
                                                                                        <td>
                                                                                            {esOOS 
                                                                                                ? <span style={{color: '#e53e3e', fontWeight: '700'}}>⚠️ OOS</span>
                                                                                                : specParam 
                                                                                                    ? <span style={{color: '#38a169'}}>✓</span>
                                                                                                    : ''
                                                                                            }
                                                                                        </td>
                                                                                    </tr>
                                                                                );
                                                                            })}
                                                                        </tbody>
                                                                    </table>
                                                                </div>
                                                            </div>
                                                        )}

                                                        <div style={{marginTop: '15px', display: 'flex', gap: '10px'}}>
                                                            <button className="btn btn-danger"
                                                                onClick={() => eliminarControlLCC(control.id)}
                                                                style={{fontSize: '13px', padding: '8px 16px'}}>
                                                                🗑️ Eliminar
                                                            </button>
                                                        </div>
                                                    </div>
                                                );
                                            });
                                        })()}
                                    </div>
                                </>
                            )}

                            {/* MODAL DE DETALLES */}
                            {controlDetalle && (
                                <div className="modal-overlay" onClick={() => setControlDetalle(null)}>
                                    <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                        <div className="modal-header">
                                            <div className="modal-title">Detalle del Control</div>
                                            <button className="modal-close" onClick={() => setControlDetalle(null)}>✕</button>
                                        </div>
                                        <div className="modal-body">
                                            <div className="detalle-grid">
                                                {controlDetalle.tipo === 'soplado' && (
                                                    <div className="detalle-item">
                                                        <div className="detalle-label">Orden</div>
                                                        <div className="detalle-value">{controlDetalle.orden.numeroOrden}</div>
                                                    </div>
                                                )}
                                                <div className="detalle-item">
                                                    <div className="detalle-label">Tipo</div>
                                                    <div className="detalle-value">{controlDetalle.control.tipo}</div>
                                                </div>
                                                <div className="detalle-item">
                                                    <div className="detalle-label">Fecha</div>
                                                    <div className="detalle-value">{formatearFecha(controlDetalle.control.fecha)}</div>
                                                </div>
                                                <div className="detalle-item">
                                                    <div className="detalle-label">Hora</div>
                                                    <div className="detalle-value">{controlDetalle.control.hora}</div>
                                                </div>
                                            </div>

                                            {/* MEDICIONES DEL CONTROL */}
                                            {controlDetalle.control.mediciones && Object.keys(controlDetalle.control.mediciones).length > 0 && (
                                                <div style={{marginTop: '20px'}}>
                                                    <h4 style={{marginBottom: '12px', color: '#2d3748', borderBottom: '2px solid #e2e8f0', paddingBottom: '8px'}}>
                                                        📏 Mediciones Registradas
                                                    </h4>
                                                    <div className="measurement-table">
                                                        <table>
                                                            <thead>
                                                                <tr>
                                                                    <th>Parámetro</th>
                                                                    <th>Valor</th>
                                                                    {controlDetalle.tipo === 'soplado' && controlDetalle.orden && (() => {
                                                                        const spec = ESPECIFICACIONES[controlDetalle.orden.envase];
                                                                        return spec ? <th>Especificación</th> : null;
                                                                    })()}
                                                                    <th>Estado</th>
                                                                </tr>
                                                            </thead>
                                                            <tbody>
                                                                {Object.entries(controlDetalle.control.mediciones).map(([key, value]) => {
                                                                    if (value === '' || value === null || value === undefined) return null;
                                                                    
                                                                    // Formatear nombre del parámetro
                                                                    const nombreParam = key
                                                                        .replace(/^(arr_|proc_|obs_)/, '')
                                                                        .replace(/_/g, ' ')
                                                                        .replace(/cav(\d)/, 'Cav $1')
                                                                        .replace(/\b\w/g, l => l.toUpperCase());
                                                                    
                                                                    // Determinar si está en spec
                                                                    let enSpec = false;
                                                                    let specMin = null, specMax = null, specUnidad = '';
                                                                    if (controlDetalle.tipo === 'soplado' && controlDetalle.orden) {
                                                                        const spec = ESPECIFICACIONES[controlDetalle.orden.envase];
                                                                        if (spec) {
                                                                            const paramBase = key.replace(/^(arr_|proc_)/, '').replace(/_cav\d$/, '');
                                                                            if (spec.parametros[paramBase]) {
                                                                                enSpec = true;
                                                                                specMin = spec.parametros[paramBase].min;
                                                                                specMax = spec.parametros[paramBase].max;
                                                                                specUnidad = spec.parametros[paramBase].unidad;
                                                                            }
                                                                        }
                                                                    }
                                                                    
                                                                    const numVal = parseFloat(value);
                                                                    const esOOS = enSpec && !isNaN(numVal) && (numVal < specMin || numVal > specMax);
                                                                    const displayValue = typeof value === 'boolean' 
                                                                        ? (value ? '✗ Sí' : '✓ No') 
                                                                        : (value === 'ok' ? '✓ OK' : value === 'no' ? '✗ NO' : value);
                                                                    
                                                                    return (
                                                                        <tr key={key} style={{background: esOOS ? '#fff5f5' : 'transparent'}}>
                                                                            <td style={{fontWeight: '600', fontSize: '13px'}}>{nombreParam}</td>
                                                                            <td style={{fontWeight: '500'}}>{displayValue}</td>
                                                                            {enSpec ? (
                                                                                <td style={{fontSize: '12px', color: '#718096'}}>
                                                                                    {specMin} - {specMax} {specUnidad}
                                                                                </td>
                                                                            ) : controlDetalle.tipo === 'soplado' && controlDetalle.orden && ESPECIFICACIONES[controlDetalle.orden.envase] ? (
                                                                                <td></td>
                                                                            ) : null}
                                                                            <td>
                                                                                {esOOS 
                                                                                    ? <span style={{color: '#e53e3e', fontWeight: '700'}}>⚠️ OOS</span>
                                                                                    : enSpec 
                                                                                        ? <span style={{color: '#38a169'}}>✓</span>
                                                                                        : ''
                                                                                }
                                                                            </td>
                                                                        </tr>
                                                                    );
                                                                })}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                </div>
                                            )}
                                            {controlDetalle.control.observaciones && (
                                                <div style={{marginTop: '20px', padding: '15px', background: '#fff5f5',
                                                    borderRadius: '8px', borderLeft: '4px solid #e53e3e'}}>
                                                    <strong>Observaciones:</strong>
                                                    <p style={{marginTop: '8px'}}>{controlDetalle.control.observaciones}</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
